<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Neusendungs-Dashboard · 7 o'clock</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.5.0/dist/chart.umd.js"></script>
<style>
:root{
  --bg:#faf8f5;--card:#fff;--ink:#1a1a1a;--ink-soft:#6b6b6b;
  --line:#ebe6df;--accent:#2d2a26;--good:#4a7c59;--warn:#c4934a;--bad:#b04848;
  --v-lager:#6b8e7f;--v-produkt:#c4934a;--v-carrier:#7d8fa3;
  --v-kunde:#b08968;--v-kulanz:#a892b8;--v-sonstiges:#9a9a9a;
  color-scheme: light;
}
*{box-sizing:border-box}
html,body{margin:0;padding:0;background:var(--bg);color:var(--ink);
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
  -webkit-font-smoothing:antialiased;font-size:14px;line-height:1.45}
a{color:inherit}
.wrap{max-width:1280px;margin:0 auto;padding:40px 24px}
.eyebrow{font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--ink-soft);font-weight:600;margin-bottom:10px}
h1{font-size:32px;font-weight:600;letter-spacing:-.01em;margin:0 0 8px}
.sub{color:var(--ink-soft);font-size:14px;margin-bottom:6px}
.data-hint{font-size:12px;color:var(--ink-soft);margin-top:6px;font-style:italic}
.tabs{display:flex;gap:6px;margin:28px 0 8px;overflow-x:auto;padding-bottom:4px;-webkit-overflow-scrolling:touch}
.tabs::-webkit-scrollbar{height:0}
.tab{flex:0 0 auto;background:var(--card);border:1px solid var(--line);border-radius:999px;
  padding:9px 16px;font-size:13px;color:var(--ink);cursor:pointer;white-space:nowrap;
  transition:all .15s ease;font-weight:500}
.tab:hover{background:#fdfcfa}
.tab.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.panel{display:none;animation:fade .25s ease}
.panel.active{display:block}
@keyframes fade{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}
.custom-controls{display:flex;flex-wrap:wrap;gap:12px;align-items:center;
  background:var(--card);border:1px solid var(--line);border-radius:10px;padding:14px 16px;margin:14px 0 20px}
.custom-controls label{font-size:12px;color:var(--ink-soft);font-weight:500;display:flex;flex-direction:column;gap:5px}
.custom-controls input[type=date]{font-family:inherit;padding:6px 8px;border:1px solid var(--line);border-radius:6px;background:var(--bg);font-size:13px;color:var(--ink)}
.custom-controls .toggle{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--ink);cursor:pointer;align-self:flex-end;padding-bottom:6px}
.custom-controls button{margin-left:auto;background:var(--accent);color:#fff;border:none;border-radius:6px;
  padding:9px 18px;font-size:13px;font-weight:500;cursor:pointer;align-self:flex-end}
.custom-controls button:hover{background:#000}
.compare-bar{background:var(--card);border:1px solid var(--line);border-radius:10px;padding:14px 18px;margin-bottom:18px;
  font-size:14px;color:var(--ink);display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px}
.compare-bar strong{font-weight:600}
.delta{font-weight:600;font-size:13px;padding:2px 8px;border-radius:4px}
.delta.up{background:rgba(176,72,72,.1);color:var(--bad)}
.delta.down{background:rgba(74,124,89,.1);color:var(--good)}
.delta.flat{background:#f0ece6;color:var(--ink-soft)}
.kpis{display:grid;grid-template-columns:repeat(5,1fr);gap:14px;margin-bottom:22px}
.kpi{background:var(--card);border:1px solid var(--line);border-radius:10px;padding:18px 18px 16px}
.kpi .lbl{font-size:11px;text-transform:uppercase;letter-spacing:.1em;color:var(--ink-soft);font-weight:600;margin-bottom:8px}
.kpi .val{font-size:28px;font-weight:600;letter-spacing:-.01em;line-height:1.1}
.kpi .sub{font-size:12px;color:var(--ink-soft);margin-top:6px;display:flex;align-items:center;gap:6px}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:18px;margin-bottom:22px}
.card{background:var(--card);border:1px solid var(--line);border-radius:10px;padding:20px}
.card h3{margin:0 0 16px;font-size:15px;font-weight:600;letter-spacing:-.005em}
.card-pad-lg{padding:22px}
.chart-wrap{position:relative;height:260px}
.chart-wrap.tall{height:320px}
.kat-list{list-style:none;padding:0;margin:0}
.kat-list li{display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:1px solid var(--line);font-size:13px}
.kat-list li:last-child{border-bottom:none}
.kat-list .name{display:flex;align-items:center;gap:9px}
.kat-list .dot{width:9px;height:9px;border-radius:50%;display:inline-block}
.kat-list .count{font-weight:600;color:var(--ink)}
.kat-list .pct{color:var(--ink-soft);font-size:12px;margin-left:8px}
table{width:100%;border-collapse:collapse;font-size:13px}
th{text-align:left;font-weight:600;font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:var(--ink-soft);
  padding:10px 8px;border-bottom:1px solid var(--line);cursor:pointer;user-select:none}
th:hover{color:var(--ink)}
th.sorted::after{content:" \25BC";font-size:9px;color:var(--accent)}
th.sorted.asc::after{content:" \25B2"}
td{padding:10px 8px;border-bottom:1px solid var(--line);vertical-align:top}
tr:last-child td{border-bottom:none}
tr:hover td{background:#fdfcfa}
.search{width:100%;padding:9px 12px;border:1px solid var(--line);border-radius:6px;background:var(--bg);
  font-family:inherit;font-size:13px;color:var(--ink);margin-bottom:14px}
.search:focus{outline:none;border-color:var(--accent)}
.pill{display:inline-block;padding:3px 9px;border-radius:999px;font-size:11px;font-weight:500;line-height:1.4;margin:1px 3px 1px 0}
.pill-kat{background:#f0ece6;color:var(--accent)}
.tag{display:inline-block;padding:3px 9px;border-radius:4px;font-size:11px;font-weight:500;color:#fff}
.tag-lager{background:var(--v-lager)}.tag-produkt{background:var(--v-produkt)}.tag-carrier{background:var(--v-carrier)}
.tag-kunde{background:var(--v-kunde)}.tag-kulanz{background:var(--v-kulanz)}.tag-sonstiges{background:var(--v-sonstiges)}
.empty{padding:40px 20px;text-align:center;color:var(--ink-soft);font-size:14px;font-style:italic}
.recs{background:var(--card);border:1px solid var(--line);border-radius:10px;padding:24px;margin-top:24px}
.recs h3{margin:0 0 4px;font-size:16px;font-weight:600}
.recs .recs-sub{font-size:12px;color:var(--ink-soft);margin-bottom:14px}
.recs-tabs{display:flex;gap:4px;margin-bottom:16px;padding:4px;background:#fdfcfa;border:1px solid var(--line);border-radius:8px;width:fit-content}
.recs-tab{appearance:none;background:transparent;border:none;padding:6px 14px;font-family:inherit;font-size:13px;color:var(--ink-soft);cursor:pointer;border-radius:6px;display:inline-flex;align-items:center;gap:8px;transition:all .15s ease}
.recs-tab:hover{color:var(--ink)}
.recs-tab.active{background:var(--ink);color:#fff}
.recs-count{display:inline-block;font-size:11px;background:rgba(0,0,0,0.06);color:var(--ink-soft);padding:1px 7px;border-radius:10px;font-weight:500;min-width:14px;text-align:center}
.recs-tab.active .recs-count{background:rgba(255,255,255,0.18);color:#fff}
.recs-pane{display:none}
.recs-pane.active{display:block}
.recs-empty{padding:20px 4px;color:var(--ink-soft);font-size:13px;font-style:italic}
.rec-item{display:flex;align-items:flex-start;gap:12px;padding:12px 0;border-bottom:1px solid var(--line)}
.rec-item:last-child{border-bottom:none}
.rec-check{flex:0 0 22px;width:22px;height:22px;border:1.5px solid var(--line);border-radius:6px;background:#fff;
  cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s ease;margin-top:1px}
.rec-check.checked{background:var(--good);border-color:var(--good)}
.rec-check.checked::after{content:"";width:6px;height:11px;border:solid #fff;border-width:0 2px 2px 0;transform:rotate(45deg) translate(-1px,-1px)}
.rec-body{flex:1;min-width:0}
.rec-title{font-weight:600;font-size:14px;color:var(--ink);margin-bottom:3px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.rec-desc{font-size:13px;color:var(--ink-soft);line-height:1.5}
.rec-item.done .rec-title,.rec-item.done .rec-desc{text-decoration:line-through;color:#b8b3a9}
.badge-ai{font-size:9px;font-weight:700;letter-spacing:.06em;padding:2px 6px;border-radius:3px;background:linear-gradient(135deg,#7d8fa3,#a892b8);color:#fff;text-transform:uppercase}
.footer{margin-top:36px;padding:24px 0;border-top:1px solid var(--line);color:var(--ink-soft);font-size:11px;text-align:center;letter-spacing:.04em}

/* === V3: Heatmap === */
.heatmap-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch}
.heatmap{width:100%;border-collapse:collapse;font-size:12px;font-variant-numeric:tabular-nums}
.heatmap th, .heatmap td{padding:8px 6px;border:1px solid var(--line);text-align:center}
.heatmap thead th{background:#fdfcfa;font-size:10px;text-transform:uppercase;letter-spacing:.06em;color:var(--ink-soft);font-weight:600;cursor:default;white-space:nowrap;line-height:1.25}
.heatmap thead th:first-child{text-align:left;padding-left:10px}
.heatmap tbody td{font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;color:var(--ink);font-weight:500;cursor:default;transition:transform .12s ease}
.heatmap tbody td:hover{transform:scale(1.05);box-shadow:0 0 0 2px var(--accent) inset;position:relative;z-index:1}
.heatmap tbody td:first-child{text-align:left;font-family:inherit;font-weight:600;color:var(--ink);max-width:200px;background:#fff !important;padding:10px 12px}
.heatmap tbody td:last-child{font-weight:700;background:#f7f3ec !important}
.heatmap .cell-zero{color:#c8c2b7}
.heat-insight{background:#f7f3ec;border:1px solid var(--line);border-left:3px solid var(--warn);
  border-radius:6px;padding:12px 14px;margin-bottom:14px;font-size:13px;color:var(--ink);line-height:1.5}
.heat-insight strong{color:var(--accent)}

/* === V3: PT-Mini-Cards === */
.pt-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:14px;margin:18px 0 22px}
.pt-card{background:var(--card);border:1px solid var(--line);border-radius:10px;padding:16px 16px 14px}
.pt-card h4{margin:0 0 4px;font-size:14px;font-weight:600;line-height:1.3}
.pt-card .pt-total{font-size:11px;color:var(--ink-soft);text-transform:uppercase;letter-spacing:.08em;margin-bottom:10px}
.pt-card .pt-chart{position:relative;height:140px;margin-bottom:10px}
.pt-card .pt-top{list-style:none;padding:0;margin:0;font-size:12px}
.pt-card .pt-top li{display:flex;justify-content:space-between;padding:4px 0;color:var(--ink-soft);gap:8px}
.pt-card .pt-top li .t{flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--ink)}
.pt-card .pt-top li .n{font-weight:600;color:var(--ink);font-variant-numeric:tabular-nums}

/* === V3: Strategic insights === */
.strat{background:var(--card);border:1px solid var(--line);border-radius:10px;padding:20px;margin-top:18px}
.strat h3{margin:0 0 4px;font-size:15px;font-weight:600}
.strat .sub{margin-bottom:14px;font-size:12px;color:var(--ink-soft)}
.strat-item{display:flex;gap:12px;padding:11px 0;border-bottom:1px solid var(--line)}
.strat-item:last-child{border-bottom:none}
.strat-icon{flex:0 0 26px;width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;
  background:#f7f3ec;color:var(--accent);font-weight:700;font-size:12px;margin-top:1px}
.strat-text{flex:1;font-size:13px;line-height:1.5;color:var(--ink)}
.strat-text strong{color:var(--accent)}

/* === V3.1: Länder === */
.country-mini{margin:6px 0 4px}
.country-mini h4{margin:0 0 10px;font-size:13px;font-weight:600;letter-spacing:-.005em;color:var(--ink)}
.country-pills{display:flex;flex-wrap:wrap;gap:8px}
.country-pill{display:inline-flex;align-items:center;gap:8px;background:#fdfcfa;border:1px solid var(--line);border-radius:8px;padding:7px 12px;font-size:12px;color:var(--ink);line-height:1.35}
.country-pill .flag{font-size:18px;line-height:1}
.country-pill .cname{font-weight:600;color:var(--ink)}
.country-pill .cnum{color:var(--ink-soft);font-variant-numeric:tabular-nums}
.country-pill .cpct{color:var(--ink-soft);font-size:11px}
.country-pill .creason{color:var(--ink-soft);font-size:11px;margin-left:4px;border-left:1px solid var(--line);padding-left:8px}
.country-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin:18px 0 22px}
.country-card{background:var(--card);border:1px solid var(--line);border-radius:10px;padding:16px 16px 14px}
.country-card h4{margin:0 0 4px;font-size:15px;font-weight:600;line-height:1.3;display:flex;align-items:center;gap:8px}
.country-card h4 .flag{font-size:22px;line-height:1}
.country-card .c-total{font-size:11px;color:var(--ink-soft);text-transform:uppercase;letter-spacing:.08em;margin-bottom:10px}
.country-card .c-chart{position:relative;height:140px;margin-bottom:10px}
.country-card .c-top{list-style:none;padding:0;margin:0;font-size:12px}
.country-card .c-top li{display:flex;justify-content:space-between;padding:4px 0;color:var(--ink-soft);gap:8px}
.country-card .c-top li .t{flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--ink)}
.country-card .c-top li .n{font-weight:600;color:var(--ink);font-variant-numeric:tabular-nums}

/* === V4: Cases-Tabelle Filter === */
.cases-filterbar{display:flex;justify-content:space-between;align-items:center;gap:10px;margin:2px 0 12px;flex-wrap:wrap;font-size:13px}
.cases-filterbar .count{color:var(--ink-soft)}
.cases-filterbar .count strong{color:var(--ink);font-weight:600}
.cases-filterbar button{background:#fdfcfa;border:1px solid var(--line);border-radius:6px;padding:6px 12px;font-family:inherit;font-size:12px;color:var(--ink);cursor:pointer}
.cases-filterbar button:hover{background:#f7f3ec}
.cases-table .filter-row th{padding:6px 6px;border-bottom:1px solid var(--line);background:#fdfcfa;font-weight:400;text-transform:none;letter-spacing:0;color:var(--ink);cursor:default}
.cases-table .filter-row input,.cases-table .filter-row select{width:100%;font-family:inherit;font-size:11px;padding:4px 6px;border:1px solid var(--line);border-radius:5px;background:#fff;color:var(--ink);min-width:0}
.cases-table .filter-row input:focus,.cases-table .filter-row select:focus{outline:none;border-color:var(--accent)}
.cases-table .filter-row .date-pair{display:flex;gap:3px}
.cases-table .filter-row .date-pair input{font-size:10px;padding:3px 4px}

/* === V5.4: Scrollbare Tabellen-Container (15 Zeilen sichtbar) === */
.tbl-scroll{overflow:auto;max-height:calc(15 * 44px + 80px);border:1px solid var(--line);border-radius:8px;background:#fff}
.tbl-scroll table{border:none;border-radius:0}
.tbl-scroll thead th{position:sticky;top:0;background:#faf8f5;z-index:2;box-shadow:0 1px 0 var(--line)}
.tbl-scroll .filter-row th{position:sticky;top:34px;background:#fdfcfa;z-index:2;box-shadow:0 1px 0 var(--line)}

/* === V4: Artikel-Suche mit Live-Total === */
.search-row{display:flex;align-items:center;gap:14px;margin-bottom:14px;flex-wrap:wrap}
.search-row .search{margin:0;flex:1;min-width:200px}
.search-row .art-total{font-size:13px;color:var(--ink-soft);white-space:nowrap}
.search-row .art-total strong{color:var(--ink);font-weight:600;font-variant-numeric:tabular-nums}

/* === V4: Verteilung nach Land (gesamt) — Zeilen statt Pills === */
.country-rows{list-style:none;padding:0;margin:0}
.country-rows li{display:grid;grid-template-columns:28px 1fr auto auto 1fr;align-items:center;gap:10px;padding:7px 4px;border-bottom:1px solid var(--line);font-size:13px}
.country-rows li:last-child{border-bottom:none}
.country-rows .flag{font-size:18px;line-height:1}
.country-rows .cname{font-weight:500;color:var(--ink)}
.country-rows .cnum{font-variant-numeric:tabular-nums;color:var(--ink);font-weight:600;text-align:right}
.country-rows .cpct{font-variant-numeric:tabular-nums;color:var(--ink-soft);font-size:12px;text-align:right;min-width:42px}
.country-rows .creason{color:var(--ink-soft);font-size:12px;border-left:1px solid var(--line);padding-left:10px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.country-mini-grid{display:grid;grid-template-columns:1fr 1fr;gap:18px;align-items:start}
.country-mini-grid .country-chart-wrap{position:relative;height:max(260px, 100%);min-height:260px}

@media (max-width:780px){
  .country-mini-grid{grid-template-columns:1fr}
  .country-rows li{grid-template-columns:24px 1fr auto auto;row-gap:2px}
  .country-rows .creason{grid-column:2 / -1;border-left:none;padding-left:0;font-size:11px}
  .wrap{padding:24px 14px}
  h1{font-size:24px}
  .kpis{grid-template-columns:repeat(2,1fr)}
  .grid-2{grid-template-columns:1fr}
  .tabs{margin-left:-14px;margin-right:-14px;padding:0 14px 6px}
  .chart-wrap{height:220px}
  .custom-controls{flex-direction:column;align-items:stretch}
  .custom-controls button{margin-left:0;width:100%}
  th,td{padding:8px 6px;font-size:12px}
  .heatmap th, .heatmap td{padding:6px 4px;font-size:11px}
  .pt-grid{grid-template-columns:1fr}
  .country-grid{grid-template-columns:1fr}
}
</style>
</head>
<body>
<div class="wrap">
  <div class="eyebrow">7 O'CLOCK · KUNDENSERVICE</div>
  <h1>Neusendungs-Dashboard</h1>
  <div class="sub" id="updatedLine">Aktualisiert am ...</div>
  <div class="data-hint" id="dataHint"></div>

  <div class="tabs" role="tablist">
    <button class="tab active" data-tab="yesterday">Gestern</button>
    <button class="tab" data-tab="7d">Letzte 7 Tage</button>
    <button class="tab" data-tab="30d">Letzte 30 Tage</button>
    <button class="tab" data-tab="90d">Letzte 90 Tage</button>
    <button class="tab" data-tab="365d">Letzte 365 Tage</button>
    <button class="tab" data-tab="custom">Custom</button>
  </div>

  <div id="panels"></div>

  <div class="recs">
    <h3>Empfehlungen &amp; Maßnahmen</h3>
    <div class="recs-sub">Erledigte Punkte werden gespeichert (lokal im Browser).</div>
    <div class="recs-tabs" role="tablist">
      <button class="recs-tab active" data-recs-tab="open" role="tab">Offen <span class="recs-count" id="recsCountOpen">0</span></button>
      <button class="recs-tab" data-recs-tab="done" role="tab">Erledigt <span class="recs-count" id="recsCountDone">0</span></button>
    </div>
    <div id="recsListOpen" class="recs-pane active"></div>
    <div id="recsListDone" class="recs-pane"></div>
  </div>

nstiges","p":[{"t":"Cappuccino Becher mit schwarzen Streifen | Miro","pt":"Keramik Becher/Tassen","q":1}]},{"d":"2026-06-22","o":"#217698","c":"Sabrina P.","l":"AT","k":"Sonstiges (alt)","v":"sonstiges","p":[{"t":"Großer Teller cremeweiß-glänzend | Nia","pt":"Sonstige","q":1}]},{"d":"2026-06-22","o":"#217703","c":"Katrin S.","l":"DE","k":"Sonstiges (alt)","v":"sonstiges","p":[{"t":"Großer Teller cremeweiß-matt | Nia","pt":"Sonstige","q":1}]},{"d":"2026-06-22","o":"#217704","c":"Kirsten K.","l":"DE","k":"Sonstiges (alt)","v":"sonstiges","p":[{"t":"Kleiner Teller cremeweiß-matt | Nia","pt":"Sonstige","q":1}]},{"d":"2026-06-22","o":"#217711","c":"Svitlana S.","l":"ES","k":"Paket zurückgekommen","v":"carrier","p":[{"t":"Glasuntersetzer Taupe/Creme | Jade","pt":"Untersetzer","q":1},{"t":"Organischer Keramik Becher Cremeweiß | Alaska","pt":"Keramik Becher/Tassen","q":1},{"t":"Karaffe im organischen Design | Alaska","pt":"Karaffe","q":1}]},{"d":"2026-06-22","o":"#217722","c":"Tassja W.","l":"DE","k":"Sonstiges (alt)","v":"sonstiges","p":[{"t":"Große Bowl Ø27cm in Cremeweiß gerillt | Nia","pt":"Salatbowl","q":1}]},{"d":"2026-06-23","o":"#217857","c":"Sarah D.","l":"DE","k":"Artikel fehlt","v":"lager","p":[{"t":"Großes organisches Glas | Alaska","pt":"Trinkglas","q":2}]},{"d":"2026-06-23","o":"#217858","c":"Sina Maria T.","l":"AT","k":"Artikel fehlt","v":"lager","p":[{"t":"Geriffeltes Glas mit Glasdeckel & Glasstrohhalm | Paris","pt":"Trinkglas","q":1}]},{"d":"2026-06-23","o":"#217862","c":"Moritz H.","l":"DE","k":"Falsche Menge","v":"lager","p":[{"t":"Gerüschte Musselin Einzelbettwäsche Beige | Haven","pt":"Bettwäsche","q":2}]}]}</script>

<script>
(function(){
'use strict';
var DATA = JSON.parse(document.getElementById('neusendungs-data').textContent);
var CASES = DATA.cases || [];

var VCOL = {lager:'#6b8e7f',produkt:'#c4934a',carrier:'#7d8fa3',kunde:'#b08968',kulanz:'#a892b8',sonstiges:'#9a9a9a'};
var VLABEL = {lager:'Lager',produkt:'Produkt',carrier:'Carrier',kunde:'Kunde',kulanz:'Kulanz',sonstiges:'Sonstiges'};
// V4: Konsistente Verursacher-Reihenfolge (V5.2: nicht mehr in UI verwendet, bleibt für Datenstruktur)
var V_ORDER = ['lager','produkt','carrier','kunde','kulanz','sonstiges'];

// V4: Vollständige Heatmap-Spaltenreihenfolge (immer alle 13 Spalten, auch wenn 0)
var REASON_ORDER = ['Defekt/Bruch','Defekt (Lager-Kontrolle)','Produktionsfehler','Artikel fehlt','Falscher Artikel','Falsche Menge','Packstation','Transportschaden','Falsche Adresse','Paket zurückgekommen','Schweiz','Kulanz','Sonstiges (alt)'];

// V5.2: Brand-Farben pro Kategorie (für Kategorien-Doughnut)
var KCOL = {
  'Defekt/Bruch':'#c4934a',
  'Defekt (Lager-Kontrolle)':'#d4a868',
  'Produktionsfehler':'#b08350',
  'Artikel fehlt':'#6b8e7f',
  'Falscher Artikel':'#7c9d8e',
  'Falsche Menge':'#8badad',
  'Packstation':'#7d8fa3',
  'Transportschaden':'#8d9fb3',
  'Falsche Adresse':'#b08968',
  'Paket zurückgekommen':'#6d7f93',
  'Schweiz':'#a892b8',
  'Kulanz':'#c4a8d4',
  'Sonstiges (alt)':'#9a9a9a'
};

// V5.4: Helper für farbige Pills mit KCOL-Tönung
function katPill(label, count){
  var col = KCOL[label] || '#c4b8a4';
  // Hex → rgba mit niedriger Opacity für Background
  function hexA(h, a){
    h = h.replace('#','');
    var r=parseInt(h.substr(0,2),16), g=parseInt(h.substr(2,2),16), b=parseInt(h.substr(4,2),16);
    return 'rgba('+r+','+g+','+b+','+a+')';
  }
  var bg = hexA(col, 0.18);
  var border = hexA(col, 0.45);
  var fg = hexA(col, 1);
  // Den Text-Foreground etwas abdunkeln für Lesbarkeit
  var txtCol = col;
  var countHTML = (count!==undefined) ? ' <strong style="font-weight:700">'+count+'</strong>' : '';
  return '<span class="pill pill-kat" style="background:'+bg+';border:1px solid '+border+';color:'+txtCol+';font-weight:500">'+escapeHTML(label)+countHTML+'</span>';
}

// V5 KRITISCH: SKU-Mapping-Fix.
// SKU 8797853122892 hieß historisch "Defekt/Bruch" (Produktion), heißt jetzt aber
// "Defekt (Lager-Kontrolle)" (= Lager hat den Schaden vor Versand kontrolliert).
// Der echte neue unkontrollierte "Defekt/Bruch" hat noch keine SKU → in der Datenbasis taucht
// "Defekt/Bruch" historisch noch auf und wird hier zu "Defekt (Lager-Kontrolle)" umgemappt.
// Zusätzlich: legacy "Wegen Defekt" → "Defekt (Lager-Kontrolle)" (falls vorhanden).
DATA.cases.forEach(function(c){
  // V6: Mapping direkt auf c.k (V5 hatte c.n[].k)
  if(c.k === 'Defekt/Bruch'){ c.k = 'Defekt (Lager-Kontrolle)'; }
  else if(c.k === 'Wegen Defekt'){ c.k = 'Defekt (Lager-Kontrolle)'; }
});

// V3.1: Länder-Mapping
var COUNTRY_NAMES = {DE:'Deutschland',AT:'Österreich',CH:'Schweiz',FR:'Frankreich',NL:'Niederlande',BE:'Belgien',FI:'Finnland',IT:'Italien',ES:'Spanien',PL:'Polen',CZ:'Tschechien',DK:'Dänemark',SE:'Schweden',LU:'Luxemburg',GB:'Großbritannien',UK:'Großbritannien',US:'USA',IE:'Irland',PT:'Portugal',HU:'Ungarn',SK:'Slowakei',SI:'Slowenien',HR:'Kroatien',RO:'Rumänien',BG:'Bulgarien',GR:'Griechenland',NO:'Norwegen',EE:'Estland',LV:'Lettland',LT:'Litauen',MT:'Malta',CY:'Zypern',IS:'Island',LI:'Liechtenstein'};
function countryName(iso2){return COUNTRY_NAMES[iso2] || iso2 || '–'}
function flagEmoji(iso2){
  if(!iso2 || iso2.length !== 2) return '';
  var A = 0x1F1E6;
  var codeA = iso2.toUpperCase().charCodeAt(0) - 65 + A;
  var codeB = iso2.toUpperCase().charCodeAt(1) - 65 + A;
  return String.fromCodePoint(codeA) + String.fromCodePoint(codeB);
}

function parseDate(s){var p=s.split('-');return new Date(Date.UTC(+p[0],+p[1]-1,+p[2]))}
function fmtDate(d){return d.toISOString().slice(0,10)}
function addDays(s,n){var d=parseDate(s);d.setUTCDate(d.getUTCDate()+n);return fmtDate(d)}
function diffDays(a,b){return Math.round((parseDate(b)-parseDate(a))/86400000)}
function fmtDE(s){var p=s.split('-');return p[2]+'.'+p[1]+'.'+p[0]}

var ALL_DATES = CASES.map(function(c){return c.d}).sort();
var MIN_DATE = ALL_DATES[0] || '2026-01-01';
var MAX_DATE = ALL_DATES[ALL_DATES.length-1] || DATA.targetDate;
// V4: Gesamt-Aggregation für "Verteilung nach Land (gesamt)" — einmal berechnet
var ALL_AGG = null; // wird nach aggregate-Definition gesetzt

document.getElementById('updatedLine').textContent = 'Aktualisiert am ' + fmtDE(DATA.lastUpdated || MAX_DATE);
document.getElementById('dataHint').textContent = 'Datensatz: ' + fmtDE(MIN_DATE) + ' bis ' + fmtDE(MAX_DATE) + ' · ' + CASES.length + ' Cases · "Gestern" = ' + fmtDE(DATA.targetDate || addDays(MAX_DATE,-1));
document.getElementById('footer').textContent = "7 o'clock · Interner Kundenservice-Report · Vertraulich · Aktualisiert am " + fmtDE(DATA.lastUpdated || MAX_DATE);

function rangeFor(tab){
  // V6-FIX: "Gestern" = targetDate aus dem JSON (= echter Vortag, nicht heute).
  // Längere Zeiträume enden ebenfalls am Vortag, NICHT am heutigen MAX_DATE.
  // Sonst würden die Werte vom unvollständigen heutigen Tag den Vergleich verfälschen.
  var anchor = DATA.targetDate || addDays(MAX_DATE,-1);
  if(tab==='yesterday') return {from:anchor,to:anchor};
  if(tab==='7d')   return {from:addDays(anchor,-6),to:anchor};
  if(tab==='30d')  return {from:addDays(anchor,-29),to:anchor};
  if(tab==='90d')  return {from:addDays(anchor,-89),to:anchor};
  if(tab==='365d') return {from:addDays(anchor,-364),to:anchor};
  return null;
}

function filterCases(from,to){
  return CASES.filter(function(c){return c.d>=from && c.d<=to});
}

function aggregate(cases){
  // V6: 1 Case = 1 Neusendung (eine Hauptkategorie c.k, ein Verursacher c.v)
  var total=0, byK={}, byV={}, byDay={}, artikelStats={}, byPT={}, ptReason={}, ptArtikel={};
  var byLand={};
  var artikelSumme=0; // V6: Summe aller nachgesendeten Original-Artikel (p[].q)
  cases.forEach(function(c){
    var land = c.l || '??';
    if(!byLand[land]) byLand[land]={total:0,byK:{},byV:{},byArtikel:{}};
    if(c.k){
      total += 1;
      byK[c.k] = (byK[c.k]||0)+1;
      byDay[c.d] = (byDay[c.d]||0)+1;
      byLand[land].total += 1;
      byLand[land].byK[c.k] = (byLand[land].byK[c.k]||0)+1;
    }
    if(c.v){
      byV[c.v] = (byV[c.v]||0)+1;
      byLand[land].byV[c.v] = (byLand[land].byV[c.v]||0)+1;
    }
    // Eine Haupt-Kategorie pro Case für artikelStats/pt-Aggregationen
    var caseKats = c.k ? [c.k] : [];
    (c.p||[]).forEach(function(p){
      if(!artikelStats[p.t]) artikelStats[p.t] = {total:0,gruende:{}};
      var pt = p.pt || 'Sonstige';
      var qty = p.q || 1; // V5.4/V6: Quantity korrekt berücksichtigen
      artikelSumme += qty;
      byLand[land].byArtikel[p.t] = (byLand[land].byArtikel[p.t]||0) + qty;
      if(caseKats.length===0){
        // Case ohne Kategorie: trotzdem die Artikel-Stats füllen ohne Grund-Pill
        artikelStats[p.t].total += qty;
        byPT[pt] = (byPT[pt]||0) + qty;
        if(!ptArtikel[pt]) ptArtikel[pt]={};
        ptArtikel[pt][p.t] = (ptArtikel[pt][p.t]||0)+qty;
      } else {
        caseKats.forEach(function(k){
          artikelStats[p.t].total += qty;
          artikelStats[p.t].gruende[k] = (artikelStats[p.t].gruende[k]||0)+qty;
          byPT[pt] = (byPT[pt]||0) + qty;
          if(!ptReason[pt]) ptReason[pt]={};
          ptReason[pt][k] = (ptReason[pt][k]||0)+qty;
          if(!ptArtikel[pt]) ptArtikel[pt]={};
          ptArtikel[pt][p.t] = (ptArtikel[pt][p.t]||0)+qty;
        });
      }
    });
  });
  return {total:total,byK:byK,byV:byV,byDay:byDay,artikelStats:artikelStats,
          byPT:byPT,ptReason:ptReason,ptArtikel:ptArtikel,byLand:byLand,
          artikelSumme:artikelSumme,cases:cases};
}

// V4: Gesamt-Aggregation einmal berechnen
ALL_AGG = aggregate(CASES);

function deltaPct(cur,prev){
  if(prev===0) return cur===0 ? 0 : 100;
  return ((cur-prev)/prev)*100;
}
function deltaHTML(cur,prev){
  var d = deltaPct(cur,prev);
  var cls='flat', arrow='→';
  if(Math.abs(d)<0.5){cls='flat';arrow='→'}
  else if(d>0){cls='up';arrow='▲'}
  else {cls='down';arrow='▼'}
  return '<span class="delta '+cls+'">'+arrow+' '+(d>0?'+':'')+d.toFixed(0)+'%</span>';
}

function bucketTrend(byDay,from,to){
  var days = diffDays(from,to)+1;
  var labels=[],values=[];
  if(days<=31){
    for(var i=0;i<days;i++){
      var ds = addDays(from,i);
      labels.push(fmtDE(ds).slice(0,5));
      values.push(byDay[ds]||0);
    }
  } else if(days<=120){
    var cur=from;
    while(cur<=to){
      var end=addDays(cur,6); if(end>to) end=to;
      var sum=0,cd=cur;
      while(cd<=end){sum+=byDay[cd]||0;cd=addDays(cd,1)}
      labels.push(fmtDE(cur).slice(0,5));
      values.push(sum);
      cur=addDays(end,1);
    }
  } else {
    var cur2=from;
    while(cur2<=to){
      var pd=parseDate(cur2);
      var monthEnd = fmtDate(new Date(Date.UTC(pd.getUTCFullYear(),pd.getUTCMonth()+1,0)));
      if(monthEnd>to) monthEnd=to;
      var sum=0,cd=cur2;
      while(cd<=monthEnd){sum+=byDay[cd]||0;cd=addDays(cd,1)}
      labels.push(cur2.slice(0,7));
      values.push(sum);
      cur2=addDays(monthEnd,1);
    }
  }
  return {labels:labels,values:values};
}

var charts = {};
function destroyChart(id){if(charts[id]){charts[id].destroy();delete charts[id]}}

function escapeHTML(s){
  if(s==null) return '';
  return String(s).replace(/[&<>"]/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]});
}
function escapeAttr(s){return escapeHTML(s).replace(/'/g,"&#39;")}

// ============ V3: Heatmap (Produktkategorie x Grund) ============
function buildHeatmap(agg, container, opts){
  opts = opts || {};
  // pts sortiert nach Gesamt absteigend
  var ptEntries = Object.keys(agg.byPT).map(function(p){return [p, agg.byPT[p]]}).sort(function(a,b){return b[1]-a[1]});
  if(opts.limit) ptEntries = ptEntries.slice(0, opts.limit);
  // V4: Wir zeigen IMMER alle Gründe aus REASON_ORDER + ggf. unbekannte am Ende
  var reasonsSet = {};
  ptEntries.forEach(function(e){
    var pr = agg.ptReason[e[0]] || {};
    Object.keys(pr).forEach(function(k){reasonsSet[k]=true});
  });
  var reasons = REASON_ORDER.slice();
  Object.keys(reasonsSet).forEach(function(r){if(reasons.indexOf(r)<0) reasons.push(r)});

  if(!ptEntries.length){
    container.innerHTML = '<div class="empty">Keine Daten</div>';
    return;
  }

  // Top insight
  var topPT = ptEntries[0];
  var topReasonForPT = '';
  var topReasonPct = 0;
  if(topPT){
    var rs = agg.ptReason[topPT[0]] || {};
    var sortedR = Object.keys(rs).map(function(r){return [r,rs[r]]}).sort(function(a,b){return b[1]-a[1]});
    if(sortedR.length){
      topReasonForPT = sortedR[0][0];
      topReasonPct = Math.round(sortedR[0][1]/topPT[1]*100);
    }
  }
  var insightHTML = topReasonForPT
    ? '<div class="heat-insight"><strong>'+topReasonPct+'%</strong> der Neusendungen in <strong>'+escapeHTML(topPT[0])+'</strong> gehen wegen <strong>'+escapeHTML(topReasonForPT)+'</strong> zurück.</div>'
    : '';

  // Build table
  var thead = '<tr><th>Produktkategorie</th>' + reasons.map(function(r){return '<th>'+escapeHTML(r)+'</th>'}).join('') + '<th>Gesamt</th></tr>';
  var tbody = ptEntries.map(function(e){
    var pt = e[0], total = e[1];
    var rs = agg.ptReason[pt] || {};
    var maxInRow = 0;
    reasons.forEach(function(r){if((rs[r]||0)>maxInRow) maxInRow=(rs[r]||0)});
    var cells = reasons.map(function(r){
      var v = rs[r] || 0;
      var op = (maxInRow>0 && v>0) ? (v/maxInRow)*0.4 : 0;
      var style = v>0 ? 'background:rgba(176,72,72,'+op.toFixed(3)+')' : '';
      var pct = total ? Math.round(v/total*100) : 0;
      var tt = escapeAttr(pt+' · '+r+' · '+v+' Items · '+pct+'% der Kategorie');
      return '<td class="'+(v===0?'cell-zero':'')+'" style="'+style+'" title="'+tt+'">'+(v||'–')+'</td>';
    }).join('');
    return '<tr><td>'+escapeHTML(pt)+'</td>'+cells+'<td>'+total+'</td></tr>';
  }).join('');

  container.innerHTML = insightHTML + '<div class="heatmap-wrap"><table class="heatmap"><thead>'+thead+'</thead><tbody>'+tbody+'</tbody></table></div>';
}

// ============ V4: Mini-Länder-Section (zeigt IMMER alle Cases, mit Bar-Chart) ============
function buildCountryMini(agg, container, chartId){
  var entries = Object.keys(agg.byLand).map(function(l){return [l, agg.byLand[l]]})
    .filter(function(e){return e[1].total>0})
    .sort(function(a,b){return b[1].total-a[1].total});
  if(!entries.length){
    container.innerHTML = '<h4>Verteilung nach Land (gesamt)</h4><div class="empty">Keine Länder-Daten</div>';
    return;
  }
  var total = entries.reduce(function(s,e){return s+e[1].total},0);
  var rows = entries.map(function(e){
    var iso = e[0], d = e[1];
    var pct = total ? Math.round(d.total/total*100) : 0;
    var topK = Object.keys(d.byK).sort(function(a,b){return d.byK[b]-d.byK[a]})[0];
    var reasonTxt = topK ? 'meist '+topK : '';
    return '<li>'
      +'<span class="flag">'+flagEmoji(iso)+'</span>'
      +'<span class="cname">'+escapeHTML(countryName(iso))+'</span>'
      +'<span class="cnum">'+d.total+'</span>'
      +'<span class="cpct">'+pct+'%</span>'
      +'<span class="creason">'+escapeHTML(reasonTxt)+'</span>'
      +'</li>';
  }).join('');
  container.innerHTML = '<h4>Verteilung nach Land (gesamt · '+total+' Cases)</h4>'
    +'<div class="country-mini-grid">'
    +'<ul class="country-rows">'+rows+'</ul>'
    +'<div class="country-chart-wrap"><canvas class="country-mini-canvas"></canvas></div>'
    +'</div>';

  // Bar-Chart (horizontal)
  if(chartId){

}

// ============ V4: Artikel-Such-Gesamt ============
function updateArtTotal(panel){
  var totalEl = panel.querySelector('.art-total-num');
  if(!totalEl) return;
  var sum = 0;
  panel.querySelectorAll('.artikel-tbody tr').forEach(function(tr){
    if(!tr.dataset.title) return;
    if(tr.style.display === 'none') return;
    sum += (+tr.dataset.total || 0);
  });
  totalEl.textContent = sum;
}

// ============ V4: Cases-Tabelle Filter ============
function applyCasesFilters(panel){
  var f = panel._casesFilters || {};
  var rows = panel.querySelectorAll('.cases-tbody tr');
  var shown = 0, total = 0;
  rows.forEach(function(tr){
    if(tr.classList.contains('empty-row')){ return; }
    if(!tr.dataset.d){ return; }
    total++;
    var visible = true;
    if(f.dateFrom && tr.dataset.d < f.dateFrom) visible = false;
    if(visible && f.dateTo && tr.dataset.d > f.dateTo) visible = false;
    if(visible && f.land && tr.dataset.l !== f.land) visible = false;
    if(visible && f.kat){
      var keys = (tr.dataset.k || '').split('|');
      if(keys.indexOf(f.kat) < 0) visible = false;
    }
    if(visible && f.art && (tr.dataset.a || '').indexOf(f.art) < 0) visible = false;
    if(visible && f.ord){
      var o = tr.dataset.o || '', cu = tr.dataset.c || '';
      if(o.indexOf(f.ord) < 0 && cu.indexOf(f.ord) < 0) visible = false;
    }
    if(visible && f.cust){
      var o2 = tr.dataset.o || '', cu2 = tr.dataset.c || '';
      if(o2.indexOf(f.cust) < 0 && cu2.indexOf(f.cust) < 0) visible = false;
    }
    tr.style.display = visible ? '' : 'none';
    if(visible) shown++;
  });
  var countShown = panel.querySelector('.cases-count-shown');
  var countTotal = panel.querySelector('.cases-count-total');
  if(countShown) countShown.textContent = shown;
  if(countTotal) countTotal.textContent = total;
}

function setupCasesFilters(panel, casesArr){
  // Filter-State pro Panel
  panel._casesFilters = panel._casesFilters || {};
  // Dropdowns füllen
  var landSel = panel.querySelector('.f-land');
  var katSel = panel.querySelector('.f-kat');
  if(landSel){
    // V4: ALLE Länder aus dem gesamten Datensatz (nicht nur zeitraumabhängig)
    var lands = Object.keys(ALL_AGG.byLand).sort();
    landSel.innerHTML = '<option value="">Alle</option>' + lands.map(function(l){
      return '<option value="'+escapeAttr(l)+'">'+escapeHTML(flagEmoji(l)+' '+countryName(l))+'</option>';
    }).join('');
    if(panel._casesFilters.land) landSel.value = panel._casesFilters.land;
  }
  if(katSel){
    katSel.innerHTML = '<option value="">Alle</option>' + REASON_ORDER.map(function(r){
      return '<option value="'+escapeAttr(r)+'">'+escapeHTML(r)+'</option>';
    }).join('');
    if(panel._casesFilters.kat) katSel.value = panel._casesFilters.kat;
  }
  // Datums-Range vom Panel ggf. übernehmen
  var fromEl = panel.querySelector('.f-date-from');
  var toEl = panel.querySelector('.f-date-to');
  if(fromEl) fromEl.value = panel._casesFilters.dateFrom || '';
  if(toEl) toEl.value = panel._casesFilters.dateTo || '';
  var ordEl = panel.querySelector('.f-order');
  var custEl = panel.querySelector('.f-customer');
  var artEl = panel.querySelector('.f-art');
  if(ordEl) ordEl.value = panel._casesFilters.ord || '';
  if(custEl) custEl.value = panel._casesFilters.cust || '';
  if(artEl) artEl.value = panel._casesFilters.art || '';

  // Event-Wiring (idempotent über _filtersBound-Flag)
  if(!panel._filtersBound){
    panel._filtersBound = true;
    function bindInput(el, key, lower){
      if(!el) return;
      el.addEventListener('input', function(){
        panel._casesFilters[key] = lower ? el.value.toLowerCase().trim() : el.value;
        applyCasesFilters(panel);
      });
    }
    function bindSelect(el, key){
      if(!el) return;
      el.addEventListener('change', function(){
        panel._casesFilters[key] = el.value;
        applyCasesFilters(panel);
      });
    }
    bindInput(panel.querySelector('.f-date-from'), 'dateFrom', false);
    bindInput(panel.querySelector('.f-date-to'), 'dateTo', false);
    bindSelect(panel.querySelector('.f-land'), 'land');
    bindSelect(panel.querySelector('.f-kat'), 'kat');
    bindInput(panel.querySelector('.f-art'), 'art', true);
    bindInput(panel.querySelector('.f-order'), 'ord', true);
    bindInput(panel.querySelector('.f-customer'), 'cust', true);
    var resetBtn = panel.querySelector('.cases-reset');
    if(resetBtn){
      resetBtn.addEventListener('click', function(){
        panel._casesFilters = {};
        ['.f-date-from','.f-date-to','.f-land','.f-kat','.f-art','.f-order','.f-customer'].forEach(function(sel){
          var el = panel.querySelector(sel); if(el) el.value = '';
        });
        applyCasesFilters(panel);
      });
    }
  }
  applyCasesFilters(panel);
}

// ============ Standard Panel ============
function renderPanel(panelId, from, to, opts){
  opts = opts || {};
  var compare = opts.compare !== false;
  var panel = document.getElementById(panelId);
  if(!panel) return;

  var cases = filterCases(from,to);
  var agg = aggregate(cases);
  var days = diffDays(from,to)+1;
  var perDay = days>0 ? (agg.total/days) : 0;

  var prevFrom = addDays(from,-days), prevTo = addDays(from,-1);
  var prevAgg = aggregate(filterCases(prevFrom,prevTo));

  var topK = Object.keys(agg.byK).sort(function(a,b){return agg.byK[b]-agg.byK[a]})[0] || '–';

  var compareHTML = compare
    ? '<div><strong>'+agg.total+'</strong> Neusendungen vs. <strong>'+prevAgg.total+'</strong> in der Vorperiode ('+fmtDE(prevFrom)+'–'+fmtDE(prevTo)+')</div>'+deltaHTML(agg.total,prevAgg.total)
    : '<div><strong>'+agg.total+'</strong> Neusendungen im Zeitraum '+fmtDE(from)+'–'+fmtDE(to)+'</div>';

  // V5.3: Top-Warengruppe (Produktkategorie aus byPT) statt Quote
  var topPT = Object.keys(agg.byPT||{}).sort(function(a,b){return (agg.byPT[b]||0)-(agg.byPT[a]||0)})[0] || '–';
  var topPTCount = (agg.byPT||{})[topPT] || 0;
  // V6: Neue KPI "Neusendungs-Artikel" = Summe der p[].q (Original-Items)
  var artikelSumme = agg.artikelSumme || 0;
  var prevArtikelSumme = prevAgg.artikelSumme || 0;
  var kpis = ''
    + '<div class="kpi"><div class="lbl">Neusendungen gesamt</div><div class="val">'+agg.total+'</div>'
      + (compare?'<div class="sub">vs. '+prevAgg.total+' '+deltaHTML(agg.total,prevAgg.total)+'</div>':'<div class="sub">'+days+' Tage</div>')+'</div>'
    + '<div class="kpi"><div class="lbl">Neusendungs-Artikel</div><div class="val">'+artikelSumme+'</div>'
      + (compare?'<div class="sub">vs. '+prevArtikelSumme+' '+deltaHTML(artikelSumme,prevArtikelSumme)+'</div>':'<div class="sub">aus Original-Items</div>')+'</div>'
    + '<div class="kpi"><div class="lbl">Top-Warengruppe</div><div class="val" style="font-size:18px;line-height:1.3">'+escapeHTML(topPT)+'</div><div class="sub">'+topPTCount+' Items</div></div>'
    + '<div class="kpi"><div class="lbl">Schnitt / Tag</div><div class="val">'+perDay.toFixed(1)+'</div>'
      + (compare?'<div class="sub">vs. '+(prevAgg.total/days).toFixed(1)+' '+deltaHTML(perDay,prevAgg.total/days)+'</div>':'<div class="sub">'+days+' Tage</div>')+'</div>'
    + '<div class="kpi"><div class="lbl">Top-Kategorie</div><div class="val" style="font-size:18px;line-height:1.3">'+escapeHTML(topK)+'</div><div class="sub">'+(agg.byK[topK]||0)+' Items</div></div>';

  // V5.3: Immer ALLE 13 Kategorien aus REASON_ORDER zeigen, fehlende mit 0
  // Zuerst alle aus REASON_ORDER mit aktuellem Count, dann unbekannte Kategorien anhängen
  var allKats = REASON_ORDER.slice();
  Object.keys(agg.byK).forEach(function(k){ if(allKats.indexOf(k)<0) allKats.push(k); });
  // Sortieren: vorhandene absteigend nach Count, leere unten (Reihenfolge REASON_ORDER)
  var katEntries = allKats.map(function(k){return [k, agg.byK[k]||0]});
  katEntries.sort(function(a,b){
    if(b[1]!==a[1]) return b[1]-a[1];
    return REASON_ORDER.indexOf(a[0]) - REASON_ORDER.indexOf(b[0]);
  });
  var katListHTML = katEntries.map(function(e){
    var pct = (agg.total && e[1]) ? ((e[1]/agg.total)*100).toFixed(1) : '0.0';
    var col = KCOL[e[0]] || '#c4b8a4';
    var dim = e[1]===0 ? ' style="opacity:0.45"' : '';
    return '<li'+dim+'><span class="name"><span class="dot" style="background:'+col+'"></span>'+escapeHTML(e[0])+'</span><span><span class="count">'+e[1]+'</span><span class="pct">'+pct+'%</span></span></li>';
  }).join('');

  var artikelArr = Object.keys(agg.artikelStats).map(function(t){
    return {title:t,total:agg.artikelStats[t].total,gruende:agg.artikelStats[t].gruende};
  });
  artikelArr.sort(function(a,b){return b.total-a.total});

  var artikelTbl = artikelArr.length ? artikelArr.map(function(a){
    var pills = Object.keys(a.gruende).sort(function(x,y){return a.gruende[y]-a.gruende[x]})
      .map(function(k){return katPill(k, a.gruende[k])}).join(' ');
    return '<tr data-title="'+escapeAttr(a.title.toLowerCase())+'" data-total="'+a.total+'"><td>'+escapeHTML(a.title)+'</td><td>'+pills+'</td><td style="text-align:right;font-weight:600">'+a.total+'</td></tr>';
  }).join('') : '<tr><td colspan="3"><div class="empty">Keine Artikel im Zeitraum</div></td></tr>';

  var casesArr = cases.slice().sort(function(a,b){return a.d<b.d?1:-1});
  var casesTbl = casesArr.length ? casesArr.map(function(c){
    // V6: c.k ist die einzige Hauptkategorie pro Case
    var kats = c.k ? katPill(c.k) : '';
    var arts = (c.p||[]).map(function(p){return escapeHTML(p.t)+(p.q>1?' ('+p.q+'×)':'')}).join('<br>');
    // V4: data-Attribute für Spalten-Filter
    var katsRaw = c.k || '';
    var artsRaw = (c.p||[]).map(function(p){return p.t}).join(' ');
    return '<tr data-d="'+escapeAttr(c.d)+'" data-l="'+escapeAttr(c.l||'')+'" data-k="'+escapeAttr(katsRaw)+'" data-o="'+escapeAttr((c.o||'').toLowerCase())+'" data-c="'+escapeAttr((c.c||'').toLowerCase())+'" data-a="'+escapeAttr(artsRaw.toLowerCase())+'">'
      +'<td>'+fmtDE(c.d)+'</td><td>'+escapeHTML(c.o)+'</td><td>'+escapeHTML(c.c)+'</td><td>'+escapeHTML(c.l)+'</td><td>'+kats+'</td><td>'+arts+'</td></tr>';
  }).join('') : '<tr class="empty-row"><td colspan="6"><div class="empty">Keine Cases im Zeitraum</div></td></tr>';

  var trend = bucketTrend(agg.byDay,from,to);

  panel.querySelector('.compare-bar').innerHTML = compareHTML;
  panel.querySelector('.kpis').innerHTML = kpis;
  panel.querySelector('.kat-list').innerHTML = katListHTML;
  panel.querySelector('.artikel-tbody').innerHTML = artikelTbl;
  panel.querySelector('.cases-tbody').innerHTML = casesTbl;

  // V4: Artikel-Gesamt initialisieren
  updateArtTotal(panel);

  // V4: Cases-Tabelle: Filter aufsetzen
  setupCasesFilters(panel, casesArr);

  // V5: Produktkategorien-Sektion (zeitraumabhängig)
  if(panel.querySelector('.pt-heatmap')){
    buildPTSection(panel, agg, panelId);
  }

  // V5: Länder-Sektion (zeitraumabhängig)
  if(panel.querySelector('.country-heatmap')){
    buildCountrySection(panel, agg, panelId);
  }

  var doughnutId = panelId+'_doughnut';
  var barId = panelId+'_bar';
  destroyChart(doughnutId);
  destroyChart(barId);

  // V5.2: Doughnut zeigt jetzt Kategorien (byK) statt Verursacher
  var kKeys = REASON_ORDER.filter(function(k){return (agg.byK[k]||0)>0});
  Object.keys(agg.byK).forEach(function(k){if(kKeys.indexOf(k)<0 && agg.byK[k]>0) kKeys.push(k)});
  var dCtx = panel.querySelector('.doughnut-canvas');
  if(kKeys.length){
    charts[doughnutId] = new Chart(dCtx,{
      type:'doughnut',
      data:{labels:kKeys,
        datasets:[{data:kKeys.map(function(k){return agg.byK[k]}),
          backgroundColor:kKeys.map(function(k){return KCOL[k]||'#9a9a9a'}),
          borderColor:'#fff',borderWidth:2}]},
      options:{responsive:true,maintainAspectRatio:false,cutout:'62%',
        plugins:{legend:{position:'bottom',labels:{boxWidth:10,padding:10,font:{size:11}}},
          tooltip:{callbacks:{label:function(c){
            var pct = agg.total ? Math.round(c.parsed/agg.total*100) : 0;
            return c.label+': '+c.parsed+' ('+pct+'%)';
          }}}}}
    });
  } else {
    dCtx.getContext('2d').clearRect(0,0,dCtx.width,dCtx.height);
  }

  var bCtx = panel.querySelector('.bar-canvas');
  if(trend.values.some(function(v){return v>0})){
    charts[barId] = new Chart(bCtx,{
      type:'bar',
      data:{labels:trend.labels,datasets:[{data:trend.values,backgroundColor:'#c4934a',borderRadius:4,maxBarThickness:34}]},
      options:{responsive:true,maintainAspectRatio:false,
        plugins:{legend:{display:false}},
        scales:{y:{beginAtZero:true,ticks:{precision:0,font:{size:11}},grid:{color:'#f0ece6'}},
                x:{ticks:{font:{size:11}},grid:{display:false}}}}
    });
  } else {
    bCtx.getContext('2d').clearRect(0,0,bCtx.width,bCtx.height);
  }
}

function buildPTSection(panel, agg, idPrefix){
  var ptEntries = Object.keys(agg.byPT).map(function(p){return [p, agg.byPT[p]]}).sort(function(a,b){return b[1]-a[1]});
  var sumLine = panel.querySelector('.pt-summary-line');
  if(sumLine){
    sumLine.innerHTML = '<strong>'+ptEntries.length+'</strong> Produktkategorien · <strong>'+ptEntries.reduce(function(s,e){return s+e[1]},0)+'</strong> Item-Vorfälle im Zeitraum';
  }

  // Bar Chart (horizontal)
  destroyChart(idPrefix+'_ptBar');
  var pCtx = panel.querySelector('.pt-bar-canvas');
  if(pCtx && ptEntries.length){
    charts[idPrefix+'_ptBar'] = new Chart(pCtx, {
      type:'bar',
      data:{
        labels: ptEntries.map(function(e){return e[0]}),
        datasets:[{data: ptEntries.map(function(e){return e[1]}), backgroundColor:'#b04848', borderRadius:4, maxBarThickness:22}]
      },
      options:{indexAxis:'y',responsive:true,maintainAspectRatio:false,
        plugins:{legend:{display:false},tooltip:{callbacks:{label:function(c){return c.parsed.x+' Item-Vorfälle'}}}},
        scales:{x:{beginAtZero:true,ticks:{precision:0,font:{size:11}},grid:{color:'#f0ece6'}},
                y:{ticks:{font:{size:11}},grid:{display:false}}}}
    });
  }

  // Heatmap (alle Kategorien)
  var heatBox = panel.querySelector('.pt-heatmap');
  if(heatBox) buildHeatmap(agg, heatBox, {});

  // Mini-Cards Top 5
  var miniGrid = panel.querySelector('.pt-mini-grid');
  var top5 = ptEntries.slice(0,5);
  if(miniGrid){
    var miniHTML = top5.map(function(e, idx){
      var pt = e[0], total = e[1];
      var arts = agg.ptArtikel[pt] || {};
      var topArts = Object.keys(arts).map(function(a){return [a,arts[a]]}).sort(function(a,b){return b[1]-a[1]}).slice(0,3);
      var topList = topArts.map(function(a){return '<li><span class="t" title="'+escapeAttr(a[0])+'">'+escapeHTML(a[0])+'</span><span class="n">'+a[1]+'</span></li>'}).join('');
      return '<div class="pt-card">'
        +'<h4>'+escapeHTML(pt)+'</h4>'
        +'<div class="pt-total">'+total+' Item-Vorfälle</div>'
        +'<div class="pt-chart"><canvas id="'+idPrefix+'_ptMini_'+idx+'"></canvas></div>'
        +'<ul class="pt-top">'+(topList||'<li>—</li>')+'</ul>'
        +'</div>';
    }).join('') || '<div class="empty">Keine Produktkategorien im Zeitraum</div>';
    miniGrid.innerHTML = miniHTML;
  }

  top5.forEach(function(e, idx){
    var pt = e[0], ptTotal = e[1];
    var rs = agg.ptReason[pt] || {};
    // V5.2: Reasons (= Kategorien) in REASON_ORDER, mit konsistenten KCOL-Farben
    var keys = REASON_ORDER.filter(function(k){return (rs[k]||0)>0});
    Object.keys(rs).forEach(function(k){if(keys.indexOf(k)<0 && rs[k]>0) keys.push(k)});
    var values = keys.map(function(k){return rs[k]});
    destroyChart(idPrefix+'_ptMini_'+idx);
    var ctx = panel.querySelector('#'+idPrefix+'_ptMini_'+idx);
    if(!ctx) return;
    if(!keys.length) return;
    charts[idPrefix+'_ptMini_'+idx] = new Chart(ctx, {
      type:'doughnut',
      data:{labels:keys,datasets:[{data:values,backgroundColor:keys.map(function(k){return KCOL[k]||'#9a9a9a'}),borderColor:'#fff',borderWidth:2}]},
      options:{responsive:true,maintainAspectRatio:false,cutout:'58%',
        plugins:{legend:{position:'bottom',labels:{boxWidth:8,padding:6,font:{size:9}}},
          tooltip:{callbacks:{label:function(c){
            var pct = ptTotal ? Math.round(c.parsed/ptTotal*100) : 0;
            return c.label+': '+c.parsed+' ('+pct+'%)';
          }}}}}
    });
  });

  // Strategische Insights
  var strat = [];
  top5.forEach(function(e){
    var pt = e[0], total = e[1];
    var rs = agg.ptReason[pt] || {};
    var sorted = Object.keys(rs).map(function(k){return [k,rs[k]]}).sort(function(a,b){return b[1]-a[1]});
    if(!sorted.length) return;
    var topR = sorted[0];
    var pct = Math.round(topR[1]/total*100);
    if(pct < 35) return;
    var action = (topR[0]==='Defekt/Bruch' || topR[0]==='Defekt (Lager-Kontrolle)' || topR[0]==='Transportschaden') ? 'Verpackungs-Audit & Inlay-Verstärkung priorisieren'
          : topR[0]==='Produktionsfehler' ? 'Lieferantengespräch & QC-Stichprobe ansetzen'
          : topR[0]==='Paket zurückgekommen' ? 'Carrier-Performance & Adress-Validierung prüfen'
          : topR[0]==='Falsche Adresse' ? 'Address Validation API im Checkout aktivieren'
          : (topR[0]==='Artikel fehlt' || topR[0]==='Falscher Artikel' || topR[0]==='Falsche Menge') ? 'Pick&Pack-Prozess im Lager auditieren'
          : 'Kategorie tiefer analysieren';
    strat.push({pt:pt,reason:topR[0],pct:pct,total:total,action:action});
  });
  // V5.2: Carrier-Quote aus Kategorien aggregieren (statt aus byV)
  var carrierTotal = (agg.byK['Paket zurückgekommen']||0) + (agg.byK['Falsche Adresse']||0) + (agg.byK['Packstation']||0) + (agg.byK['Transportschaden']||0);
  if(agg.total>0 && carrierTotal/agg.total > 0.1){
    strat.push({pt:'Alle Kategorien',reason:'Versand-/Carrier-Themen',pct:Math.round(carrierTotal/agg.total*100),total:carrierTotal,
      action:'Quartalsgespräch mit Versanddienstleister & Region-Analyse'});
  }
  var stratBox = panel.querySelector('.pt-strat');
  if(stratBox){
    var stratHTML = '<h3>Strategische Erkenntnisse</h3><div class="sub">Automatisch generiert aus der Heatmap des Zeitraums</div>';
    if(strat.length){
      stratHTML += strat.map(function(s, i){
        return '<div class="strat-item"><div class="strat-icon">'+(i+1)+'</div>'
          +'<div class="strat-text"><strong>'+escapeHTML(s.pt)+'</strong>: '+s.pct+'% '+escapeHTML(s.reason)+' ('+s.total+' Vorfälle) → '+escapeHTML(s.action)+'</div></div>';
      }).join('');
    } else {
      stratHTML += '<div class="empty">Keine dominanten Muster — Probleme verteilen sich gleichmäßig.</div>';
    }
    stratBox.innerHTML = stratHTML;
  }
}

function buildCountrySection(panel, agg, idPrefix){
  var entries = Object.keys(agg.byLand).map(function(l){return [l, agg.byLand[l]]})
    .filter(function(e){return e[1].total>0})
    .sort(function(a,b){return b[1].total-a[1].total});
  var total = entries.reduce(function(s,e){return s+e[1].total},0);

  // Summary line
  var sumLine = panel.querySelector('.country-summary-line');
  if(sumLine){
    sumLine.innerHTML = '<strong>'+entries.length+'</strong> Länder · <strong>'+total+'</strong> Cases im Zeitraum';
  }

  // Rows untereinander
  var rowsEl = panel.querySelector('.country-rows');
  if(rowsEl){
    if(!entries.length){
      rowsEl.innerHTML = '<li><div class="empty" style="grid-column:1 / -1">Keine Länder-Daten im Zeitraum</div></li>';
    } else {
      rowsEl.innerHTML = entries.map(function(e){
        var iso = e[0], d = e[1];
        var pct = total ? Math.round(d.total/total*100) : 0;
        var topK = Object.keys(d.byK).sort(function(a,b){return d.byK[b]-d.byK[a]})[0];
        var reasonTxt = topK ? 'meist '+topK : '';
        return '<li>'
          +'<span class="flag">'+flagEmoji(iso)+'</span>'
          +'<span class="cname">'+escapeHTML(countryName(iso))+'</span>'
          +'<span class="cnum">'+d.total+'</span>'
          +'<span class="cpct">'+pct+'%</span>'
          +'<span class="creason">'+escapeHTML(reasonTxt)+'</span>'
          +'</li>';
      }).join('');
    }
  }

  // Horizontal Bar Chart Top 10
  destroyChart(idPrefix+'_countryBar');
  var top10 = entries.slice(0,10);
  var cCtx = panel.querySelector('.country-bar-canvas');
  if(cCtx && top10.length){
    charts[idPrefix+'_countryBar'] = new Chart(cCtx, {
      type:'bar',
      data:{
        labels: top10.map(function(e){return flagEmoji(e[0])+' '+countryName(e[0])}),
        datasets:[{data: top10.map(function(e){return e[1].total}), backgroundColor:'#c4934a', borderRadius:4, maxBarThickness:18}]
      },
      options:{indexAxis:'y',responsive:true,maintainAspectRatio:false,
        plugins:{legend:{display:false},tooltip:{callbacks:{label:function(c){
          var pct = total ? Math.round(c.parsed.x/total*100) : 0;
          return c.parsed.x+' Cases ('+pct+'%)';
        }}}},
        scales:{x:{beginAtZero:true,ticks:{precision:0,font:{size:11}},grid:{color:'#f0ece6'}},
                y:{ticks:{font:{size:11}},grid:{display:false}}}}
    });
  }

  // Heatmap Land × Grund
  var heatBox = panel.querySelector('.country-heatmap');
  if(heatBox) buildCountryHeatmap(agg, heatBox);

  // Mini-Cards Top 3
  var miniBox = panel.querySelector('.country-mini-cards');
  var top3 = entries.slice(0,3);
  if(miniBox){
    if(!top3.length){
      miniBox.innerHTML = '<div class="empty">Keine Länder-Daten im Zeitraum</div>';
    } else {
      miniBox.innerHTML = top3.map(function(e, idx){
        var iso = e[0], d = e[1];
        var arts = d.byArtikel || {};
        var topArts = Object.keys(arts).map(function(a){return [a,arts[a]]}).sort(function(a,b){return b[1]-a[1]}).slice(0,3);
        var topList = topArts.map(function(a){return '<li><span class="t" title="'+escapeAttr(a[0])+'">'+escapeHTML(a[0])+'</span><span class="n">'+a[1]+'</span></li>'}).join('');
        return '<div class="country-card">'
          +'<h4><span class="flag">'+flagEmoji(iso)+'</span>'+escapeHTML(countryName(iso))+'</h4>'
          +'<div class="c-total">'+d.total+' Neusendungen</div>'
          +'<div class="c-chart"><canvas id="'+idPrefix+'_countryMini_'+idx+'"></canvas></div>'
          +'<ul class="c-top">'+(topList||'<li>—</li>')+'</ul>'
          +'</div>';
      }).join('');
      top3.forEach(function(e, idx){
        var d = e[1];
        // V5.2: Mini-Doughnut zeigt jetzt Kategorien (byK) statt Verursacher
        var kKeys = REASON_ORDER.filter(function(k){return (d.byK[k]||0)>0});
        Object.keys(d.byK).forEach(function(k){if(kKeys.indexOf(k)<0 && d.byK[k]>0) kKeys.push(k)});
        if(!kKeys.length) return;
        destroyChart(idPrefix+'_countryMini_'+idx);
        var ctx = panel.querySelector('#'+idPrefix+'_countryMini_'+idx);
        if(!ctx) return;
        charts[idPrefix+'_countryMini_'+idx] = new Chart(ctx, {
          type:'doughnut',
          data:{labels:kKeys,
            datasets:[{data:kKeys.map(function(k){return d.byK[k]}),
              backgroundColor:kKeys.map(function(k){return KCOL[k]||'#9a9a9a'}),
              borderColor:'#fff',borderWidth:2}]},
          options:{responsive:true,maintainAspectRatio:false,cutout:'58%',
            plugins:{legend:{position:'bottom',labels:{boxWidth:8,padding:6,font:{size:9}}},
              tooltip:{callbacks:{label:function(c){
                var pct = d.total ? Math.round(c.parsed/d.total*100) : 0;
                return c.label+': '+c.parsed+' ('+pct+'%)';
              }}}}}
        });
      });
    }
  }

  // Internationale Erkenntnisse
  var strat = [];
  entries.forEach(function(e){
    var iso = e[0], d = e[1];
    if(d.total < 2) return;
    var sortedK = Object.keys(d.byK).map(function(k){return [k,d.byK[k]]}).sort(function(a,b){return b[1]-a[1]});
    if(!sortedK.length) return;
    var topK = sortedK[0];
    var pct = Math.round(topK[1]/d.total*100);
    // V5.2: Carrier-Quote aus Kategorien (byK) statt Verursacher (byV)
    var carrierAbs = (d.byK['Paket zurückgekommen']||0) + (d.byK['Falsche Adresse']||0) + (d.byK['Packstation']||0);
    var carrierPct = d.total ? Math.round(carrierAbs/d.total*100) : 0;
    var bruchAbs = (d.byK['Defekt/Bruch']||0) + (d.byK['Defekt (Lager-Kontrolle)']||0) + (d.byK['Transportschaden']||0);
    var bruchPct = Math.round(bruchAbs/d.total*100);

    if(iso==='CH' && (d.byK['Schweiz']||0)/d.total > 0.5){
      strat.push({iso:iso,text:'Schweiz: '+Math.round((d.byK['Schweiz']||0)/d.total*100)+'% Zoll-/Schweiz-Sonderfall ('+d.total+' Neusendungen) → CH-Versand-Prozess separat behandeln.'});
    } else if(carrierPct >= 25){
      strat.push({iso:iso,text:countryName(iso)+': hohe Versand-Quote ('+carrierPct+'% Paket-Rückläufer/Adresse/Packstation bei '+d.total+' Neusendungen) → Versanddienstleister & Adress-Validierung prüfen.'});
    } else if(bruchPct >= 50 && d.total >= 5){
      strat.push({iso:iso,text:countryName(iso)+': Bruchquote überdurchschnittlich ('+bruchPct+'% Defekt/Transport) → Verpackungs-Audit für diese Region.'});
    } else if(pct >= 50 && d.total >= 3){
      strat.push({iso:iso,text:countryName(iso)+': '+pct+'% '+topK[0]+' ('+d.total+' Neusendungen) → Muster im Auge behalten.'});
    }
  });
  var stratBox = panel.querySelector('.country-strat');
  if(stratBox){
    var stratHTML = '<h3>Internationale Erkenntnisse</h3><div class="sub">Automatisch generiert aus Land × Grund (Zeitraum)</div>';
    if(strat.length){
      stratHTML += strat.slice(0,8).map(function(s){
        return '<div class="strat-item"><div class="strat-icon">'+flagEmoji(s.iso)+'</div>'
          +'<div class="strat-text">'+escapeHTML(s.text)+'</div></div>';
      }).join('');
    } else {
      stratHTML += '<div class="empty">Keine dominanten Muster — Probleme verteilen sich gleichmäßig.</div>';
    }
    stratBox.innerHTML = stratHTML;
  }
}

function buildCountryHeatmap(agg, container){
  var entries = Object.keys(agg.byLand).map(function(l){return [l,agg.byLand[l]]})
    .filter(function(e){return e[1].total>0})
    .sort(function(a,b){return b[1].total-a[1].total});
  if(!entries.length){container.innerHTML='<div class="empty">Keine Daten</div>';return}
  var reasonsSet = {};
  entries.forEach(function(e){
    Object.keys(e[1].byK).forEach(function(k){reasonsSet[k]=true});
  });
  // V4: immer alle 13 Gründe zeigen
  var reasons = REASON_ORDER.slice();
  Object.keys(reasonsSet).forEach(function(r){if(reasons.indexOf(r)<0) reasons.push(r)});

  var thead = '<tr><th>Land</th>' + reasons.map(function(r){return '<th>'+escapeHTML(r)+'</th>'}).join('') + '<th>Gesamt</th></tr>';
  var tbody = entries.map(function(e){
    var iso = e[0], d = e[1];
    var rs = d.byK || {};
    var maxInRow = 0;
    reasons.forEach(function(r){if((rs[r]||0)>maxInRow) maxInRow=(rs[r]||0)});
    var cells = reasons.map(function(r){
      var v = rs[r]||0;
      var op = (maxInRow>0 && v>0) ? (v/maxInRow)*0.4 : 0;
      var style = v>0 ? 'background:rgba(176,72,72,'+op.toFixed(3)+')' : '';
      var pct = d.total ? Math.round(v/d.total*100) : 0;
      var tt = escapeAttr(countryName(iso)+' · '+r+' · '+v+' · '+pct+'% des Landes');
      return '<td class="'+(v===0?'cell-zero':'')+'" style="'+style+'" title="'+tt+'">'+(v||'–')+'</td>';
    }).join('');
    var label = flagEmoji(iso)+' '+countryName(iso);
    return '<tr><td>'+escapeHTML(label)+'</td>'+cells+'<td>'+d.total+'</td></tr>';
  }).join('');
  container.innerHTML = '<div class="heatmap-wrap"><table class="heatmap"><thead>'+thead+'</thead><tbody>'+tbody+'</tbody></table></div>';
}

// Article search + sort
document.querySelectorAll('.panel').forEach(function(panel){
  var search = panel.querySelector('.artikel-search');
  if(!search) return;
  search.addEventListener('input',function(){
    // V5.4: AND-Suche – mehrere Begriffe (durch Leerzeichen getrennt) müssen ALLE matchen, Reihenfolge egal.
    // Sucht in Titel UND in Pills (Gründe), nicht nur im Titel.
    var raw = search.value.toLowerCase().trim();
    var terms = raw.length ? raw.split(/\s+/).filter(function(t){return t.length>0}) : [];
    panel.querySelectorAll('.artikel-tbody tr').forEach(function(tr){
      if(!tr.dataset.title){return}
      // Haystack: Titel + sichtbarer Text (inkl. Pills/Gründe)
      var hay = (tr.dataset.title + ' ' + tr.textContent).toLowerCase();
      var match = terms.every(function(t){return hay.indexOf(t)>=0});
      tr.style.display = match ? '' : 'none';
    });
    // V4: Live-Gesamtsumme aktualisieren
    updateArtTotal(panel);
  });
  var table = panel.querySelector('.artikel-table');
  if(!table) return;
  table.querySelectorAll('th[data-sort]').forEach(function(th){
    th.addEventListener('click',function(){
      var key = th.dataset.sort;
      var asc = th.classList.contains('sorted') && !th.classList.contains('asc');
      table.querySelectorAll('th').forEach(function(x){x.classList.remove('sorted','asc')});
      th.classList.add('sorted'); if(asc) th.classList.add('asc');
      var tbody = panel.querySelector('.artikel-tbody');
      var rows = Array.prototype.slice.call(tbody.querySelectorAll('tr')).filter(function(r){return r.dataset.title});
      rows.sort(function(a,b){
        var av, bv;
        if(key==='total'){av=+a.dataset.total;bv=+b.dataset.total;return asc?av-bv:bv-av}
        av=a.dataset.title;bv=b.dataset.title;
        return asc?av.localeCompare(bv):bv.localeCompare(av);
      });
      rows.forEach(function(r){tbody.appendChild(r)});
      updateArtTotal(panel);
    });
  });
});

function generateAIRecs(){
  var allAgg = aggregate(CASES);
  var recs = [];
  var sonstigesK = allAgg.byK['Sonstiges (alt)'] || 0;
  if(allAgg.total>0 && sonstigesK/allAgg.total > 0.4){
    recs.push({id:'ai-1', ai:true, title:'Altdaten-Audit: "Sonstiges (alt)" ist '+Math.round(sonstigesK/allAgg.total*100)+'% aller Cases',
      desc:'Die Sammel-SKU "Sonstiges (alt)" macht den Großteil der Neusendungen aus. Diese Tickets manuell auf die neuen Kategorien umlabeln, damit das Reporting echte Ursachen zeigt.'});
  }
  var topArt = Object.keys(allAgg.artikelStats).map(function(t){return [t,allAgg.artikelStats[t].total]})
    .sort(function(a,b){return b[1]-a[1]})[0];
  if(topArt && topArt[1]>=10){
    recs.push({id:'ai-2', ai:true, title:'Lieferantengespräch: "'+topArt[0]+'" wurde '+topArt[1]+'× nachgesendet',
      desc:'Dieser Artikel ist der mit Abstand häufigste Nachsende-Grund. Mit dem Lieferanten Qualität, Verpackung am Werk und mögliche Konstruktionsänderungen besprechen.'});
  }
  // V5.2: Carrier-Quote aus Kategorien (byK) statt Verursacher (byV)
  var carrierV = (allAgg.byK['Paket zurückgekommen']||0) + (allAgg.byK['Falsche Adresse']||0) + (allAgg.byK['Packstation']||0);
  if(allAgg.total>0 && carrierV/allAgg.total > 0.07){
    recs.push({id:'ai-3', ai:true, title:'Carrier-Performance prüfen: '+Math.round(carrierV/allAgg.total*100)+'% Paket-Rückläufer/Adresse/Packstation',
      desc:'Auffällig viele versand-bedingte Neusendungen. Quartalsgespräch mit dem Versanddienstleister, Sendungsverfolgungs-Daten je Region analysieren.'});
  }
  // V3: Top-Kategorie/Reason-Insight
  var ptEntries = Object.keys(allAgg.byPT).map(function(p){return [p, allAgg.byPT[p]]}).sort(function(a,b){return b[1]-a[1]});
  if(ptEntries.length){
    var topPT = ptEntries[0];
    var rs = allAgg.ptReason[topPT[0]] || {};
    var sortedR = Object.keys(rs).map(function(k){return [k,rs[k]]}).sort(function(a,b){return b[1]-a[1]});
    if(sortedR.length && sortedR[0][1]/topPT[1] > 0.3){
      var pct = Math.round(sortedR[0][1]/topPT[1]*100);
      recs.push({id:'ai-4', ai:true, title:'Heatmap-Insight: '+topPT[0]+' → '+pct+'% wegen '+sortedR[0][0],
        desc:'Größte Produktkategorie hat ein klares Muster. Maßnahme: siehe Empfehlungen im Tab "Produktkategorien".'});
    }
  }
  return recs;
}

  var checked = doneState[r.id] ? 'checked' : '';
  return '<div class="rec-item" data-todo-id="'+r.id+'">'
    + '<div class="rec-check '+checked+'" role="checkbox" aria-checked="'+(doneState[r.id]?'true':'false')+'" tabindex="0"></div>'
    + '<div class="rec-body">'
      + '<div class="rec-title">'+escapeHTML(r.title)+(r.ai?' <span class="badge-ai">KI</span>':'')+'</div>'
      + '<div class="rec-desc">'+escapeHTML(r.desc)+'</div>'
    + '</div></div>';
}

function renderRecs(){
  var paneOpen = document.getElementById('recsListOpen');
  var paneDone = document.getElementById('recsListDone');
  var openRecs = ALL_RECS.filter(function(r){return !doneState[r.id]});
  var doneRecs = ALL_RECS.filter(function(r){return !!doneState[r.id]});
  paneOpen.innerHTML = openRecs.length ? openRecs.map(recItemHTML).join('') : '<div class="recs-empty">Keine offenen Empfehlungen – alles erledigt 🎉</div>';
  paneDone.innerHTML = doneRecs.length ? doneRecs.map(recItemHTML).join('') : '<div class="recs-empty">Noch nichts erledigt.</div>';
  document.getElementById('recsCountOpen').textContent = openRecs.length;
  document.getElementById('recsCountDone').textContent = doneRecs.length;
  // Click-Handler binden
  document.querySelectorAll('.recs-pane .rec-item').forEach(function(item){
    var check = item.querySelector('.rec-check');
    var id = item.dataset.todoId;
    function toggle(){
      doneState[id] = !doneState[id];
      localStorage.setItem('neusendung_todos', JSON.stringify(doneState));
      // komplett neu rendern, damit das Item in den anderen Tab wandert
      renderRecs();
    }
    check.addEventListener('click', toggle);
    check.addEventListener('keydown', function(e){if(e.key===' '||e.key==='Enter'){e.preventDefault();toggle()}});
  });
}
renderRecs();

// V6.2: Tab-Switch innerhalb der Empfehlungen-Box
document.querySelectorAll('.recs-tab').forEach(function(tab){
  tab.addEventListener('click', function(){
    var target = tab.dataset.recsTab;
    document.querySelectorAll('.recs-tab').forEach(function(t){t.classList.toggle('active', t===tab)});
    document.getElementById('recsListOpen').classList.toggle('active', target==='open');
    document.getElementById('recsListDone').classList.toggle('active', target==='done');
  });
});

})();
</script>
</body>
</html>
