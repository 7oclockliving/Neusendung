<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Neusendungs-Dashboard · 7 o'clock</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.5.0/dist/chart.umd.js"></script>
<style>
:root{
  --bg:#faf8f5;--card:#fff;--ink:#1a1a1a;--ink-soft:#6b6b6b;
  --line:#ebe6df;--accent:#2d2a26;--good:#4a7c59;--warn:#c4934a;--bad:#b04848;
  --v-lager:#6b8e7f;--v-produkt:#c4934a;--v-carrier:#7d8fa3;
  --v-kunde:#b08968;--v-kulanz:#a892b8;--v-sonstiges:#9a9a9a;
  color-scheme: light;
}
*{box-sizing:border-box}
html,body{margin:0;padding:0;background:var(--bg);color:var(--ink);
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
  -webkit-font-smoothing:antialiased;font-size:14px;line-height:1.45}
a{color:inherit}
.wrap{max-width:1280px;margin:0 auto;padding:40px 24px}
.eyebrow{font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--ink-soft);font-weight:600;margin-bottom:10px}
h1{font-size:32px;font-weight:600;letter-spacing:-.01em;margin:0 0 8px}
.sub{color:var(--ink-soft);font-size:14px;margin-bottom:6px}
.data-hint{font-size:12px;color:var(--ink-soft);margin-top:6px;font-style:italic}
.tabs{display:flex;gap:6px;margin:28px 0 8px;overflow-x:auto;padding-bottom:4px;-webkit-overflow-scrolling:touch}
.tabs::-webkit-scrollbar{height:0}
.tab{flex:0 0 auto;background:var(--card);border:1px solid var(--line);border-radius:999px;
  padding:9px 16px;font-size:13px;color:var(--ink);cursor:pointer;white-space:nowrap;
  transition:all .15s ease;font-weight:500}
.tab:hover{background:#fdfcfa}
.tab.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.panel{display:none;animation:fade .25s ease}
.panel.active{display:block}
@keyframes fade{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}
.custom-controls{display:flex;flex-wrap:wrap;gap:12px;align-items:center;
  background:var(--card);border:1px solid var(--line);border-radius:10px;padding:14px 16px;margin:14px 0 20px}
.custom-controls label{font-size:12px;color:var(--ink-soft);font-weight:500;display:flex;flex-direction:column;gap:5px}
.custom-controls input[type=date]{font-family:inherit;padding:6px 8px;border:1px solid var(--line);border-radius:6px;background:var(--bg);font-size:13px;color:var(--ink)}
.custom-controls .toggle{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--ink);cursor:pointer;align-self:flex-end;padding-bottom:6px}
.custom-controls button{margin-left:auto;background:var(--accent);color:#fff;border:none;border-radius:6px;
  padding:9px 18px;font-size:13px;font-weight:500;cursor:pointer;align-self:flex-end}
.custom-controls button:hover{background:#000}
.compare-bar{background:var(--card);border:1px solid var(--line);border-radius:10px;padding:14px 18px;margin-bottom:18px;
  font-size:14px;color:var(--ink);display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px}
.compare-bar strong{font-weight:600}
.delta{font-weight:600;font-size:13px;padding:2px 8px;border-radius:4px}
.delta.up{background:rgba(176,72,72,.1);color:var(--bad)}
.delta.down{background:rgba(74,124,89,.1);color:var(--good)}
.delta.flat{background:#f0ece6;color:var(--ink-soft)}
.kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:22px}
.kpi{background:var(--card);border:1px solid var(--line);border-radius:10px;padding:18px 18px 16px}
.kpi .lbl{font-size:11px;text-transform:uppercase;letter-spacing:.1em;color:var(--ink-soft);font-weight:600;margin-bottom:8px}
.kpi .val{font-size:28px;font-weight:600;letter-spacing:-.01em;line-height:1.1}
.kpi .sub{font-size:12px;color:var(--ink-soft);margin-top:6px;display:flex;align-items:center;gap:6px}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:18px;margin-bottom:22px}
.card{background:var(--card);border:1px solid var(--line);border-radius:10px;padding:20px}
.card h3{margin:0 0 16px;font-size:15px;font-weight:600;letter-spacing:-.005em}
.card-pad-lg{padding:22px}
.chart-wrap{position:relative;height:260px}
.kat-list{list-style:none;padding:0;margin:0}
.kat-list li{display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:1px solid var(--line);font-size:13px}
.kat-list li:last-child{border-bottom:none}
.kat-list .name{display:flex;align-items:center;gap:9px}
.kat-list .dot{width:9px;height:9px;border-radius:50%;display:inline-block}
.kat-list .count{font-weight:600;color:var(--ink)}
.kat-list .pct{color:var(--ink-soft);font-size:12px;margin-left:8px}
table{width:100%;border-collapse:collapse;font-size:13px}
th{text-align:left;font-weight:600;font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:var(--ink-soft);
  padding:10px 8px;border-bottom:1px solid var(--line);cursor:pointer;user-select:none}
th:hover{color:var(--ink)}
th.sorted::after{content:" \25BC";font-size:9px;color:var(--accent)}
th.sorted.asc::after{content:" \25B2"}
td{padding:10px 8px;border-bottom:1px solid var(--line);vertical-align:top}
tr:last-child td{border-bottom:none}
tr:hover td{background:#fdfcfa}
.search{width:100%;padding:9px 12px;border:1px solid var(--line);border-radius:6px;background:var(--bg);
  font-family:inherit;font-size:13px;color:var(--ink);margin-bottom:14px}
.search:focus{outline:none;border-color:var(--accent)}
.pill{display:inline-block;padding:3px 9px;border-radius:999px;font-size:11px;font-weight:500;line-height:1.4;margin:1px 3px 1px 0}
.pill-kat{background:#f0ece6;color:var(--accent)}
.tag{display:inline-block;padding:3px 9px;border-radius:4px;font-size:11px;font-weight:500;color:#fff}
.tag-lager{background:var(--v-lager)}.tag-produkt{background:var(--v-produkt)}.tag-carrier{background:var(--v-carrier)}
.tag-kunde{background:var(--v-kunde)}.tag-kulanz{background:var(--v-kulanz)}.tag-sonstiges{background:var(--v-sonstiges)}
.empty{padding:40px 20px;text-align:center;color:var(--ink-soft);font-size:14px;font-style:italic}
.recs{background:var(--card);border:1px solid var(--line);border-radius:10px;padding:24px;margin-top:24px}
.recs h3{margin:0 0 4px;font-size:16px;font-weight:600}
.recs .recs-sub{font-size:12px;color:var(--ink-soft);margin-bottom:18px}
.rec-item{display:flex;align-items:flex-start;gap:12px;padding:12px 0;border-bottom:1px solid var(--line)}
.rec-item:last-child{border-bottom:none}
.rec-check{flex:0 0 22px;width:22px;height:22px;border:1.5px solid var(--line);border-radius:6px;background:#fff;
  cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s ease;margin-top:1px}
.rec-check.checked{background:var(--good);border-color:var(--good)}
.rec-check.checked::after{content:"";width:6px;height:11px;border:solid #fff;border-width:0 2px 2px 0;transform:rotate(45deg) translate(-1px,-1px)}
.rec-body{flex:1;min-width:0}
.rec-title{font-weight:600;font-size:14px;color:var(--ink);margin-bottom:3px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.rec-desc{font-size:13px;color:var(--ink-soft);line-height:1.5}
.rec-item.done .rec-title,.rec-item.done .rec-desc{text-decoration:line-through;color:#b8b3a9}
.badge-ai{font-size:9px;font-weight:700;letter-spacing:.06em;padding:2px 6px;border-radius:3px;background:linear-gradient(135deg,#7d8fa3,#a892b8);color:#fff;text-transform:uppercase}
.footer{margin-top:36px;padding:24px 0;border-top:1px solid var(--line);color:var(--ink-soft);font-size:11px;text-align:center;letter-spacing:.04em}
@media (max-width:780px){
  .wrap{padding:24px 14px}
  h1{font-size:24px}
  .kpis{grid-template-columns:repeat(2,1fr)}
  .grid-2{grid-template-columns:1fr}
  .tabs{margin-left:-14px;margin-right:-14px;padding:0 14px 6px}
  .chart-wrap{height:220px}
  .custom-controls{flex-direction:column;align-items:stretch}
  .custom-controls button{margin-left:0;width:100%}
  th,td{padding:8px 6px;font-size:12px}
}
</style>
</head>

<script>
(function(){
'use strict';
var DATA = JSON.parse(document.getElementById('neusendungs-data').textContent);
var CASES = DATA.cases || [];

var VCOL = {lager:'#6b8e7f',produkt:'#c4934a',carrier:'#7d8fa3',kunde:'#b08968',kulanz:'#a892b8',sonstiges:'#9a9a9a'};
var VLABEL = {lager:'Lager',produkt:'Produkt',carrier:'Carrier',kunde:'Kunde',kulanz:'Kulanz',sonstiges:'Sonstiges'};

function parseDate(s){var p=s.split('-');return new Date(Date.UTC(+p[0],+p[1]-1,+p[2]))}
function fmtDate(d){return d.toISOString().slice(0,10)}
function addDays(s,n){var d=parseDate(s);d.setUTCDate(d.getUTCDate()+n);return fmtDate(d)}
function diffDays(a,b){return Math.round((parseDate(b)-parseDate(a))/86400000)}
function fmtDE(s){var p=s.split('-');return p[2]+'.'+p[1]+'.'+p[0]}

var ALL_DATES = CASES.map(function(c){return c.d}).sort();
var MIN_DATE = ALL_DATES[0] || '2026-01-01';
var MAX_DATE = ALL_DATES[ALL_DATES.length-1] || DATA.targetDate;

document.getElementById('updatedLine').textContent = 'Aktualisiert am ' + fmtDE(DATA.lastUpdated || MAX_DATE);
document.getElementById('dataHint').textContent = 'Datensatz: ' + fmtDE(MIN_DATE) + ' bis ' + fmtDE(MAX_DATE) + ' · ' + CASES.length + ' Cases · Zeiträume relativ zum letzten Datum.';
document.getElementById('footer').textContent = "7 o'clock · Interner Kundenservice-Report · Vertraulich · Aktualisiert am " + fmtDE(DATA.lastUpdated || MAX_DATE);

function rangeFor(tab){
  var anchor = MAX_DATE; // "yesterday" fallback
  if(tab==='yesterday') return {from:anchor,to:anchor};
  if(tab==='7d')   return {from:addDays(anchor,-6),to:anchor};
  if(tab==='30d')  return {from:addDays(anchor,-29),to:anchor};
  if(tab==='90d')  return {from:addDays(anchor,-89),to:anchor};
  if(tab==='365d') return {from:addDays(anchor,-364),to:anchor};
  return null;
}

function filterCases(from,to){
  return CASES.filter(function(c){return c.d>=from && c.d<=to});
}

function aggregate(cases){
  var total=0, byK={}, byV={}, byDay={}, artikelStats={};
  cases.forEach(function(c){
    var caseKats=[];
    (c.n||[]).forEach(function(n){
      total += n.q;
      byK[n.k] = (byK[n.k]||0)+n.q;
      byV[n.v] = (byV[n.v]||0)+n.q;
      byDay[c.d] = (byDay[c.d]||0)+n.q;
      caseKats.push(n.k);
    });
    (c.p||[]).forEach(function(p){
      if(!artikelStats[p.t]) artikelStats[p.t] = {total:0,gruende:{}};
      caseKats.forEach(function(k){
        artikelStats[p.t].total += 1;
        artikelStats[p.t].gruende[k] = (artikelStats[p.t].gruende[k]||0)+1;
      });
    });
  });
  return {total:total,byK:byK,byV:byV,byDay:byDay,artikelStats:artikelStats,cases:cases};
}

function deltaPct(cur,prev){
  if(prev===0) return cur===0 ? 0 : 100;
  return ((cur-prev)/prev)*100;
}

function deltaHTML(cur,prev,invert){
  var d = deltaPct(cur,prev);
  var cls = 'flat', arrow='→';
  if(Math.abs(d)<0.5){cls='flat';arrow='→'}
  else if(d>0){cls = invert?'up':'down'; arrow='▲'}
  else {cls = invert?'down':'up'; arrow='▼'}
  // Direction: more Neusendungen = bad (red = up). invert false => up=red.
  // But spec says +rot, -grün => higher numbers red. Keep default.
  return '<span class="delta '+cls+'">'+arrow+' '+(d>0?'+':'')+d.toFixed(0)+'%</span>';
}

function bucketTrend(byDay,from,to){
  var days = diffDays(from,to)+1;
  var labels=[],values=[];
  if(days<=31){
    for(var i=0;i<days;i++){
      var ds = addDays(from,i);
      labels.push(fmtDE(ds).slice(0,5));
      values.push(byDay[ds]||0);
    }
  } else if(days<=120){
    // weekly buckets
    var cur=from;
    while(cur<=to){
      var end=addDays(cur,6); if(end>to) end=to;
      var sum=0,cd=cur;
      while(cd<=end){sum+=byDay[cd]||0;cd=addDays(cd,1)}
      labels.push(fmtDE(cur).slice(0,5));
      values.push(sum);
      cur=addDays(end,1);
    }
  } else {
    // monthly
    var cur2=from;
    while(cur2<=to){
      var pd=parseDate(cur2);
      var monthEnd = fmtDate(new Date(Date.UTC(pd.getUTCFullYear(),pd.getUTCMonth()+1,0)));
      if(monthEnd>to) monthEnd=to;
      var sum=0,cd=cur2;
      while(cd<=monthEnd){sum+=byDay[cd]||0;cd=addDays(cd,1)}
      labels.push(cur2.slice(0,7));
      values.push(sum);
      cur2=addDays(monthEnd,1);
    }
  }
  return {labels:labels,values:values};
}

var charts = {};
function destroyChart(id){if(charts[id]){charts[id].destroy();delete charts[id]}}

function renderPanel(panelId, from, to, opts){
  opts = opts || {};
  var compare = opts.compare !== false;
  var panel = document.getElementById(panelId);
  if(!panel) return;

  var cases = filterCases(from,to);
  var agg = aggregate(cases);
  var days = diffDays(from,to)+1;
  var perDay = days>0 ? (agg.total/days) : 0;

  // Compare period
  var prevFrom = addDays(from,-days), prevTo = addDays(from,-1);
  var prevAgg = aggregate(filterCases(prevFrom,prevTo));

  var topK = Object.keys(agg.byK).sort(function(a,b){return agg.byK[b]-agg.byK[a]})[0] || '–';

  var compareHTML = compare
    ? '<div><strong>'+agg.total+'</strong> Neusendungen vs. <strong>'+prevAgg.total+'</strong> in der Vorperiode ('+fmtDE(prevFrom)+'–'+fmtDE(prevTo)+')</div>'+deltaHTML(agg.total,prevAgg.total)
    : '<div><strong>'+agg.total+'</strong> Neusendungen im Zeitraum '+fmtDE(from)+'–'+fmtDE(to)+'</div>';

  var kpis = ''
    + '<div class="kpi"><div class="lbl">Neusendungen gesamt</div><div class="val">'+agg.total+'</div>'
      + (compare?'<div class="sub">vs. '+prevAgg.total+' '+deltaHTML(agg.total,prevAgg.total)+'</div>':'<div class="sub">'+days+' Tage</div>')+'</div>'
    + '<div class="kpi"><div class="lbl">Quote</div><div class="val">–</div><div class="sub">Order-Daten fehlen</div></div>'
    + '<div class="kpi"><div class="lbl">Schnitt / Tag</div><div class="val">'+perDay.toFixed(1)+'</div>'
      + (compare?'<div class="sub">vs. '+(prevAgg.total/days).toFixed(1)+' '+deltaHTML(perDay,prevAgg.total/days)+'</div>':'<div class="sub">'+days+' Tage</div>')+'</div>'
    + '<div class="kpi"><div class="lbl">Top-Kategorie</div><div class="val" style="font-size:18px;line-height:1.3">'+topK+'</div><div class="sub">'+(agg.byK[topK]||0)+' Items</div></div>';

  var katEntries = Object.keys(agg.byK).map(function(k){return [k,agg.byK[k]]}).sort(function(a,b){return b[1]-a[1]});
  var katListHTML = katEntries.length
    ? katEntries.map(function(e){
        var pct = agg.total ? ((e[1]/agg.total)*100).toFixed(1) : 0;
        return '<li><span class="name"><span class="dot" style="background:#c4b8a4"></span>'+escapeHTML(e[0])+'</span><span><span class="count">'+e[1]+'</span><span class="pct">'+pct+'%</span></span></li>';
      }).join('')
    : '<div class="empty">Keine Kategorien</div>';

  // Artikel stats
  var artikelArr = Object.keys(agg.artikelStats).map(function(t){
    return {title:t,total:agg.artikelStats[t].total,gruende:agg.artikelStats[t].gruende};
  });
  artikelArr.sort(function(a,b){return b.total-a.total});

  var artikelTbl = artikelArr.length ? artikelArr.map(function(a){
    var pills = Object.keys(a.gruende).sort(function(x,y){return a.gruende[y]-a.gruende[x]})
      .map(function(k){return '<span class="pill pill-kat">'+escapeHTML(k)+' '+a.gruende[k]+'</span>'}).join('');
    return '<tr data-title="'+escapeAttr(a.title.toLowerCase())+'" data-total="'+a.total+'"><td>'+escapeHTML(a.title)+'</td><td>'+pills+'</td><td style="text-align:right;font-weight:600">'+a.total+'</td></tr>';
  }).join('') : '<tr><td colspan="3"><div class="empty">Keine Artikel im Zeitraum</div></td></tr>';

  // Cases table
  var casesArr = cases.slice().sort(function(a,b){return a.d<b.d?1:-1});
  var casesTbl = casesArr.length ? casesArr.map(function(c){
    var kats = (c.n||[]).map(function(n){return '<span class="pill pill-kat">'+escapeHTML(n.k)+'</span>'}).join('');
    var verus = {};
    (c.n||[]).forEach(function(n){verus[n.v]=true});
    var vTags = Object.keys(verus).map(function(v){return '<span class="tag tag-'+v+'">'+VLABEL[v]+'</span>'}).join(' ');
    var arts = (c.p||[]).map(function(p){return escapeHTML(p.t)+(p.q>1?' ('+p.q+'×)':'')}).join('<br>');
    return '<tr><td>'+fmtDE(c.d)+'</td><td>'+escapeHTML(c.o)+'</td><td>'+escapeHTML(c.c)+'</td><td>'+escapeHTML(c.l)+'</td><td>'+kats+'</td><td>'+vTags+'</td><td>'+arts+'</td></tr>';
  }).join('') : '<tr><td colspan="7"><div class="empty">Keine Cases im Zeitraum</div></td></tr>';

  // Trend
  var trend = bucketTrend(agg.byDay,from,to);

  panel.querySelector('.compare-bar').innerHTML = compareHTML;
  panel.querySelector('.kpis').innerHTML = kpis;
  panel.querySelector('.kat-list').innerHTML = katListHTML;
  panel.querySelector('.artikel-tbody').innerHTML = artikelTbl;
  panel.querySelector('.cases-tbody').innerHTML = casesTbl;

  // Charts
  var doughnutId = panelId+'_doughnut';
  var barId = panelId+'_bar';
  destroyChart(doughnutId);
  destroyChart(barId);

  var vKeys = Object.keys(agg.byV);
  var dCtx = panel.querySelector('.doughnut-canvas');
  if(vKeys.length){
    charts[doughnutId] = new Chart(dCtx,{
      type:'doughnut',
      data:{labels:vKeys.map(function(k){return VLABEL[k]||k}),
        datasets:[{data:vKeys.map(function(k){return agg.byV[k]}),
          backgroundColor:vKeys.map(function(k){return VCOL[k]||'#9a9a9a'}),
          borderColor:'#fff',borderWidth:2}]},
      options:{responsive:true,maintainAspectRatio:false,cutout:'62%',
        plugins:{legend:{position:'bottom',labels:{boxWidth:10,padding:14,font:{size:12}}}}}
    });
  } else {
    dCtx.getContext('2d').clearRect(0,0,dCtx.width,dCtx.height);
  }

  var bCtx = panel.querySelector('.bar-canvas');
  if(trend.values.some(function(v){return v>0})){
    charts[barId] = new Chart(bCtx,{
      type:'bar',
      data:{labels:trend.labels,datasets:[{data:trend.values,backgroundColor:'#c4934a',borderRadius:4,maxBarThickness:34}]},
      options:{responsive:true,maintainAspectRatio:false,
        plugins:{legend:{display:false}},
        scales:{y:{beginAtZero:true,ticks:{precision:0,font:{size:11}},grid:{color:'#f0ece6'}},
                x:{ticks:{font:{size:11}},grid:{display:false}}}}
    });
  } else {
    bCtx.getContext('2d').clearRect(0,0,bCtx.width,bCtx.height);
  }
}

function escapeHTML(s){
  if(s==null) return '';
  return String(s).replace(/[&<>"]/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]});
}
function escapeAttr(s){return escapeHTML(s).replace(/'/g,"&#39;")}

    + '</div>'

      + '<input type="search" class="search artikel-search" placeholder="Artikel suchen ...">'
      + '<div style="overflow-x:auto"><table class="artikel-table"><thead><tr>'
        + '<th data-sort="title">Artikel</th><th>Gründe</th><th data-sort="total" class="sorted" style="text-align:right">Gesamt</th>'

    + '</div>'

var panelsDiv = document.getElementById('panels');
var tabs = ['yesterday','7d','30d','90d','365d'];
panelsDiv.innerHTML = tabs.map(function(t){return panelTemplate('panel-'+t)}).join('') + customPanelTemplate();

// Mark first panel active
document.getElementById('panel-yesterday').classList.add('active');

// Build all built-in panels
tabs.forEach(function(t){
  var r = rangeFor(t);
  renderPanel('panel-'+t, r.from, r.to, {compare:true});
});

// Custom defaults: last 30 days
var custFrom = document.getElementById('custFrom');
var custTo = document.getElementById('custTo');
custFrom.min = MIN_DATE; custFrom.max = MAX_DATE;
custTo.min = MIN_DATE; custTo.max = MAX_DATE;
custTo.value = MAX_DATE;
custFrom.value = (function(){var d=addDays(MAX_DATE,-29);return d<MIN_DATE?MIN_DATE:d})();
renderPanel('panel-custom', custFrom.value, custTo.value, {compare:document.getElementById('custCompare').checked});

document.getElementById('custApply').addEventListener('click',function(){
  var f = custFrom.value, tt = custTo.value;
  if(!f || !tt) return;
  if(f>tt){var tmp=f;f=tt;tt=tmp;custFrom.value=f;custTo.value=tt}
  renderPanel('panel-custom', f, tt, {compare:document.getElementById('custCompare').checked});
});
document.getElementById('custCompare').addEventListener('change',function(){
  renderPanel('panel-custom', custFrom.value, custTo.value, {compare:this.checked});
});

// Tab switching with localStorage persistence
var savedTab = localStorage.getItem('neusendung_tab') || 'yesterday';
function activateTab(name){
  document.querySelectorAll('.tab').forEach(function(t){
    t.classList.toggle('active', t.dataset.tab===name);
  });
  document.querySelectorAll('.panel').forEach(function(p){
    p.classList.toggle('active', p.id==='panel-'+name);
  });
  localStorage.setItem('neusendung_tab', name);
  // resize charts
  setTimeout(function(){
    Object.keys(charts).forEach(function(k){try{charts[k].resize()}catch(e){}});
  },50);
}
document.querySelectorAll('.tab').forEach(function(t){
  t.addEventListener('click',function(){activateTab(t.dataset.tab)});
});
if(savedTab && document.querySelector('.tab[data-tab="'+savedTab+'"]')) activateTab(savedTab);

// Article search + sort
document.querySelectorAll('.panel').forEach(function(panel){
  var search = panel.querySelector('.artikel-search');
  search.addEventListener('input',function(){
    var q = search.value.toLowerCase().trim();
    panel.querySelectorAll('.artikel-tbody tr').forEach(function(tr){
      if(!tr.dataset.title){return}
      tr.style.display = tr.dataset.title.indexOf(q)>=0 ? '' : 'none';
    });
  });
  var table = panel.querySelector('.artikel-table');
  table.querySelectorAll('th[data-sort]').forEach(function(th){
    th.addEventListener('click',function(){
      var key = th.dataset.sort;
      var asc = th.classList.contains('sorted') && !th.classList.contains('asc');
      table.querySelectorAll('th').forEach(function(x){x.classList.remove('sorted','asc')});
      th.classList.add('sorted'); if(asc) th.classList.add('asc');
      var tbody = panel.querySelector('.artikel-tbody');
      var rows = Array.prototype.slice.call(tbody.querySelectorAll('tr')).filter(function(r){return r.dataset.title});
      rows.sort(function(a,b){
        var av, bv;
        if(key==='total'){av=+a.dataset.total;bv=+b.dataset.total;return asc?av-bv:bv-av}
        av=a.dataset.title;bv=b.dataset.title;
        return asc?av.localeCompare(bv):bv.localeCompare(av);
      });
      rows.forEach(function(r){tbody.appendChild(r)});
    });
  });
});

// Recommendations
var FIX_RECS = [
  {id:'fix-1', title:'Support-Team schulen: neue Neusendungs-SKUs nutzen', desc:'Statt "NEUSENDUNG" immer die spezifische Kategorie (Defekt/Bruch, Artikel fehlt, etc.). Ohne saubere Kategorisierung bleibt das Reporting wertlos.'},
  {id:'fix-2', title:'Nia-Teller Verpackung A/B-testen', desc:'Top-Bruchware. Verstärktes Inlay, dickere Pappumhüllung oder neues Karton-Format speziell für große Teller testen.'},
  {id:'fix-3', title:'Adressvalidierung im Checkout aktivieren', desc:'Google Address Validation API einbauen, um Carrier-Rückläufer zu reduzieren.'},
  {id:'fix-4', title:'Monats-COGS-Tracking für Neusendungen', desc:'Versteckte Kosten der Nachsendungen als KPI in der Monatsauswertung sichtbar machen.'}
];

function generateAIRecs(){
  var allAgg = aggregate(CASES);
  var recs = [];
  // 1. Sonstiges (alt) dominanz
  var sonstigesK = allAgg.byK['Sonstiges (alt)'] || 0;
  if(allAgg.total>0 && sonstigesK/allAgg.total > 0.4){
    recs.push({id:'ai-1', ai:true, title:'Altdaten-Audit: "Sonstiges (alt)" ist '+Math.round(sonstigesK/allAgg.total*100)+'% aller Cases',
      desc:'Die Sammel-SKU "Sonstiges (alt)" macht den Großteil der Neusendungen aus. Diese Tickets manuell auf die neuen Kategorien umlabeln, damit das Reporting echte Ursachen zeigt.'});
  }
  // 2. Top artikel >10x
  var topArt = Object.keys(allAgg.artikelStats).map(function(t){return [t,allAgg.artikelStats[t].total]})
    .sort(function(a,b){return b[1]-a[1]})[0];
  if(topArt && topArt[1]>=10){
    recs.push({id:'ai-2', ai:true, title:'Lieferantengespräch: "'+topArt[0]+'" wurde '+topArt[1]+'× nachgesendet',
      desc:'Dieser Artikel ist der mit Abstand häufigste Nachsende-Grund. Mit dem Lieferanten Qualität, Verpackung am Werk und mögliche Konstruktionsänderungen besprechen.'});
  }
  // 3. Carrier-Anteil
  var carrierV = allAgg.byV['carrier'] || 0;
  if(allAgg.total>0 && carrierV/allAgg.total > 0.07){
    recs.push({id:'ai-3', ai:true, title:'Carrier-Performance prüfen: '+Math.round(carrierV/allAgg.total*100)+'% Paket-Rückläufer',
      desc:'Auffällig viele Carrier-bedingte Neusendungen. Quartalsgespräch mit dem Versanddienstleister, Sendungsverfolgungs-Daten je Region analysieren.'});
  }
  return recs;
}

var ALL_RECS = FIX_RECS.concat(generateAIRecs());
var doneState = JSON.parse(localStorage.getItem('neusendung_todos') || '{}');
function renderRecs(){
  var c = document.getElementById('recsList');
  c.innerHTML = ALL_RECS.map(function(r){
    var done = doneState[r.id] ? 'done' : '';
    var checked = doneState[r.id] ? 'checked' : '';
    return '<div class="rec-item '+done+'" data-todo-id="'+r.id+'">'
      + '<div class="rec-check '+checked+'" role="checkbox" aria-checked="'+(doneState[r.id]?'true':'false')+'" tabindex="0"></div>'
      + '<div class="rec-body">'
        + '<div class="rec-title">'+escapeHTML(r.title)+(r.ai?' <span class="badge-ai">KI</span>':'')+'</div>'
        + '<div class="rec-desc">'+escapeHTML(r.desc)+'</div>'
      + '</div></div>';
  }).join('');
  document.querySelectorAll('.rec-item').forEach(function(item){
    var check = item.querySelector('.rec-check');
    var id = item.dataset.todoId;
    function toggle(){
      doneState[id] = !doneState[id];
      localStorage.setItem('neusendung_todos', JSON.stringify(doneState));
      item.classList.toggle('done', !!doneState[id]);
      check.classList.toggle('checked', !!doneState[id]);
      check.setAttribute('aria-checked', doneState[id]?'true':'false');
    }
    check.addEventListener('click', toggle);
    check.addEventListener('keydown', function(e){if(e.key===' '||e.key==='Enter'){e.preventDefault();toggle()}});
  });
}
renderRecs();

})();
